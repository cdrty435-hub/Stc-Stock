<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 간트 대시보드</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #f7c94f;
    --accent3: #4fce8e;
    --danger: #f75c5c;
    --warn: #f79a4f;
    --text: #e8eaf2;
    --muted: #7a80a0;
    --font-ui: 'Segoe UI', 'Noto Sans KR', sans-serif;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 14px; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--text); }
  .header-actions { display: flex; gap: 8px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius); border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 9px; font-size: 12px; }

  /* ── LAYOUT ── */
  .container { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  /* ── SUMMARY CARDS ── */
  .summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px;
  }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  .card-value { font-size: 26px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .c-blue { color: var(--accent); }
  .c-yellow { color: var(--accent2); }
  .c-green { color: var(--accent3); }
  .c-red { color: var(--danger); }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .toolbar-group { display: flex; align-items: center; gap: 6px; }
  select, input[type=text], input[type=date], input[type=number] {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 13px;
  }
  select:focus, input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  label { font-size: 12px; color: var(--muted); }

  /* ── TABLE PANEL ── */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 13px; font-weight: 700; color: var(--text); }

  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    background: var(--surface2); padding: 9px 12px; text-align: left;
    font-size: 11px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted);
    border-bottom: 1px solid var(--border); position: sticky; top: 0;
  }
  .data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(79,142,247,.05); }

  /* ── STATUS BADGE ── */
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 700; white-space: nowrap;
  }
  .badge-plan { background: rgba(122,128,160,.2); color: var(--muted); }
  .badge-progress { background: rgba(79,142,247,.2); color: var(--accent); }
  .badge-done { background: rgba(79,206,142,.2); color: var(--accent3); }
  .badge-delay { background: rgba(247,92,92,.2); color: var(--danger); }
  .badge-hold { background: rgba(247,154,79,.2); color: var(--warn); }

  /* ── PROGRESS BAR ── */
  .prog-wrap { width: 100px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .prog-bar { height: 100%; border-radius: 3px; transition: width .3s; }

  /* ── GANTT ── */
  .gantt-wrap { overflow-x: auto; }
  .gantt-container { min-width: 900px; }
  .gantt-header { display: flex; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .gantt-info-cols { width: 420px; flex-shrink: 0; display: flex; }
  .gantt-info-col { padding: 8px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); border-right: 1px solid var(--border); }
  .gantt-info-col.col-name { width: 160px; }
  .gantt-info-col.col-owner { width: 90px; }
  .gantt-info-col.col-status { width: 90px; }
  .gantt-info-col.col-pct { width: 80px; }
  .gantt-timeline { flex: 1; display: flex; }
  .gantt-month { flex: 1; padding: 8px 6px; font-size: 11px; color: var(--muted); text-align: center; border-right: 1px solid var(--border); white-space: nowrap; }
  .gantt-month.current { color: var(--accent); font-weight: 700; }

  .gantt-row { display: flex; border-bottom: 1px solid var(--border); align-items: center; min-height: 42px; }
  .gantt-row:hover { background: rgba(79,142,247,.04); }
  .gantt-row-info { width: 420px; flex-shrink: 0; display: flex; align-items: center; }
  .gantt-cell { padding: 6px 10px; border-right: 1px solid var(--border); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gantt-cell.col-name { width: 160px; }
  .gantt-cell.col-owner { width: 90px; color: var(--muted); font-size: 12px; }
  .gantt-cell.col-status { width: 90px; }
  .gantt-cell.col-pct { width: 80px; font-size: 12px; color: var(--muted); }
  .gantt-bar-area { flex: 1; position: relative; height: 42px; }
  .gantt-today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent2); opacity: .7; z-index: 2; pointer-events: none; }
  .gantt-bar {
    position: absolute; top: 50%; transform: translateY(-50%);
    height: 18px; border-radius: 4px;
    display: flex; align-items: center; padding: 0 6px;
    font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden;
    cursor: default; transition: opacity .15s;
  }
  .gantt-bar:hover { opacity: .85; }
  .bar-plan { background: rgba(122,128,160,.4); color: var(--muted); }
  .bar-progress { background: rgba(79,142,247,.7); color: #fff; }
  .bar-done { background: rgba(79,206,142,.7); color: #fff; }
  .bar-delay { background: rgba(247,92,92,.7); color: #fff; }
  .bar-hold { background: rgba(247,154,79,.6); color: #fff; }
  /* progress fill inside bar */
  .gantt-bar-fill {
    position: absolute; top: 0; left: 0; bottom: 0; border-radius: 4px;
    background: rgba(255,255,255,.18);
  }
  .gantt-bar-label { position: relative; z-index: 1; }

  /* month divider grid */
  .gantt-grid-line {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: var(--border); z-index: 0;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 560px; max-width: 96vw; max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1/-1; }
  .form-group label { font-size: 12px; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: var(--font-ui);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab {
    padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; color: var(--muted); transition: all .15s;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab:not(.active):hover { border-color: var(--border); color: var(--text); }

  /* ── TOOLTIP ── */
  .tooltip-wrap { position: relative; display: inline-block; }
  .tooltip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1e2235; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 12px; white-space: nowrap; z-index: 50; color: var(--text);
    pointer-events: none;
  }
  .tooltip-wrap:hover .tooltip { display: block; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .summary-row { grid-template-columns: repeat(2,1fr); }
    .gantt-info-cols { width: 200px; }
    .gantt-cell.col-name { width: 200px; }
    .gantt-cell.col-owner, .gantt-cell.col-status, .gantt-cell.col-pct,
    .gantt-info-col.col-owner, .gantt-info-col.col-status, .gantt-info-col.col-pct { display: none; }
    .gantt-row-info { width: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">STC <span>Project Gantt</span>
    <div id="syncStatus" style="font-size:10px;font-weight:400;color:var(--muted);margin-top:2px">⚪ 로딩 중...</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="exportCSV()">📥 CSV 내보내기</button>
    <button class="btn btn-secondary" onclick="importCSV()">📤 CSV 가져오기</button>
    <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="handleCSV(event)">
    <button class="btn btn-primary" onclick="openModal()">＋ 작업 추가</button>
  </div>
</header>

<div class="container">

  <!-- Summary -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('gantt',this)">📊 간트 차트</div>
    <div class="tab" onclick="switchTab('table',this)">📋 목록 보기</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">
      <label>담당자</label>
      <select id="filterOwner" onchange="render()">
        <option value="">전체</option>
      </select>
    </div>
    <div class="toolbar-group">
      <label>상태</label>
      <select id="filterStatus" onchange="render()">
        <option value="">전체</option>
        <option value="plan">계획</option>
        <option value="progress">진행중</option>
        <option value="done">완료</option>
        <option value="delay">지연</option>
        <option value="hold">보류</option>
      </select>
    </div>
    <div class="toolbar-group">
      <label>구분</label>
      <select id="filterCategory" onchange="render()">
        <option value="">전체</option>
      </select>
    </div>
    <div class="toolbar-group">
      <label>기간</label>
      <select id="ganttRange" onchange="render()">
        <option value="6">6개월</option>
        <option value="12" selected>12개월</option>
        <option value="18">18개월</option>
        <option value="24">24개월</option>
      </select>
    </div>
    <input type="text" id="searchInput" placeholder="🔍 검색..." style="min-width:180px" oninput="render()">
  </div>

  <!-- Gantt Panel -->
  <div id="ganttPanel" class="panel">
    <div class="panel-header">
      <span class="panel-title">📊 간트 차트</span>
      <span id="ganttInfo" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div class="gantt-wrap">
      <div class="gantt-container" id="ganttContainer"></div>
    </div>
  </div>

  <!-- Table Panel -->
  <div id="tablePanel" class="panel" style="display:none">
    <div class="panel-header">
      <span class="panel-title">📋 작업 목록</span>
      <span id="tableCount" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table" id="dataTable">
        <thead>
          <tr>
            <th>작업명</th><th>구분</th><th>담당자</th>
            <th>시작일</th><th>종료일</th><th>진행률</th>
            <th>상태</th><th>비고</th><th>관리</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">작업 추가</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>작업명 *</label>
        <input type="text" id="f_name" placeholder="예: 컴프레서 오버홀">
      </div>
      <div class="form-group">
        <label>구분/카테고리</label>
        <input type="text" id="f_category" placeholder="예: 설비보전, 개발, 관리">
      </div>
      <div class="form-group">
        <label>담당자</label>
        <input type="text" id="f_owner" placeholder="이름">
      </div>
      <div class="form-group">
        <label>시작일 *</label>
        <input type="date" id="f_start">
      </div>
      <div class="form-group">
        <label>종료일 *</label>
        <input type="date" id="f_end">
      </div>
      <div class="form-group">
        <label>진행률 (%)</label>
        <input type="number" id="f_pct" min="0" max="100" value="0">
      </div>
      <div class="form-group">
        <label>상태</label>
        <select id="f_status">
          <option value="plan">계획</option>
          <option value="progress">진행중</option>
          <option value="done">완료</option>
          <option value="delay">지연</option>
          <option value="hold">보류</option>
        </select>
      </div>
      <div class="form-group full">
        <label>비고</label>
        <textarea id="f_note" placeholder="메모, 링크, 이슈 등"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveTask()">저장</button>
    </div>
  </div>
</div>

<script>
/* ── DATA ── */
const GANTT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwl4-r4zEACG65iUd8YCnRCi7G3xAYslEnedJ8T8K4ohZkQswueGh8flN5p6d5_SZof6Q/exec';
let tasks = [];
let editId = null;
let currentTab = 'gantt';

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function setSyncStatus(text, ok) {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = (ok ? '🟢 ' : '⚪ ') + text;
}

/* ── 구글시트 연동 (URL 미설정 시 localStorage로 자동 폴백) ── */
async function loadTasks() {
  const hasUrl = GANTT_SCRIPT_URL && GANTT_SCRIPT_URL !== 'GANTT_SCRIPT_URL_HERE';
  if (!hasUrl) {
    tasks = JSON.parse(localStorage.getItem('gantt_tasks') || '[]');
    if (!tasks.length) tasks = getDefaultTasks();
    setSyncStatus('로컬 저장 (URL 미설정)', false);
    return;
  }
  try {
    const res = await fetch(GANTT_SCRIPT_URL);
    const data = await res.json();
    if (data.ok) {
      tasks = data.tasks.map(t => ({ ...t, pct: +t.pct || 0 }));
      if (!tasks.length) { tasks = getDefaultTasks(); await syncSave(); }
      setSyncStatus('구글시트 연동', true);
    } else {
      throw new Error('API 응답 오류');
    }
  } catch (err) {
    console.error(err);
    tasks = JSON.parse(localStorage.getItem('gantt_tasks') || '[]');
    if (!tasks.length) tasks = getDefaultTasks();
    setSyncStatus('연결 실패 (로컬 사용중)', false);
  }
}

async function syncSave() {
  localStorage.setItem('gantt_tasks', JSON.stringify(tasks));
  const hasUrl = GANTT_SCRIPT_URL && GANTT_SCRIPT_URL !== 'GANTT_SCRIPT_URL_HERE';
  if (!hasUrl) return;
  try {
    setSyncStatus('저장 중...', true);
    await fetch(GANTT_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ tasks }),
    });
    setSyncStatus('구글시트 연동', true);
  } catch (err) {
    console.error(err);
    setSyncStatus('저장 실패 (로컬만 반영됨)', false);
  }
}
function save() { syncSave(); }

function getDefaultTasks() {
  const y = new Date().getFullYear();
  return [
    { id: uid(), name: 'CBM 시스템 설계', category: '개발', owner: '이종명', start: `${y}-01-05`, end: `${y}-03-31`, pct: 80, status: 'progress', note: 'ESP32-S3 + RPi4 아키텍처' },
    { id: uid(), name: '에어컴프레서 오버홀', category: '설비보전', owner: '이종명', start: `${y}-02-01`, end: `${y}-02-28`, pct: 100, status: 'done', note: 'DC-A 라인 2대' },
    { id: uid(), name: 'OEE 대시보드 개선', category: '개발', owner: '이종명', start: `${y}-03-01`, end: `${y}-05-31`, pct: 60, status: 'progress', note: 'Google Sheets 연동' },
    { id: uid(), name: 'APFR 증설 계획', category: '전기', owner: '이종명', start: `${y}-04-01`, end: `${y}-06-30`, pct: 30, status: 'progress', note: '300kVar → 600kVar 단계 증설' },
    { id: uid(), name: 'PLC 디지털트윈 구축', category: '개발', owner: '이종명', start: `${y}-05-01`, end: `${y}-09-30`, pct: 10, status: 'plan', note: 'GX Works2 + Factory I/O' },
    { id: uid(), name: 'DC-13 이슈 재발방지 대책', category: '설비보전', owner: '이종명', start: `${y}-03-15`, end: `${y}-04-15`, pct: 100, status: 'done', note: '' },
    { id: uid(), name: 'LS 트리밍 프레스 유압점검', category: '설비보전', owner: '이종명', start: `${y}-06-01`, end: `${y}-07-31`, pct: 0, status: 'plan', note: '솔레노이드 밸브 교체 포함' },
    { id: uid(), name: '연간 PM 계획 수립', category: '관리', owner: '이종명', start: `${y}-01-01`, end: `${y}-12-31`, pct: 50, status: 'progress', note: '월별 PM 스케줄' },
  ];
}

/* ── STATUS CONFIG ── */
const STATUS = {
  plan:     { label:'계획',   badge:'badge-plan',     bar:'bar-plan',     color:'rgba(122,128,160,0.7)' },
  progress: { label:'진행중', badge:'badge-progress', bar:'bar-progress', color:'rgba(79,142,247,0.8)' },
  done:     { label:'완료',   badge:'badge-done',     bar:'bar-done',     color:'rgba(79,206,142,0.8)' },
  delay:    { label:'지연',   badge:'badge-delay',    bar:'bar-delay',    color:'rgba(247,92,92,0.8)' },
  hold:     { label:'보류',   badge:'badge-hold',     bar:'bar-hold',     color:'rgba(247,154,79,0.7)' },
};

/* ── FILTERS ── */
function getFiltered() {
  const owner    = document.getElementById('filterOwner').value;
  const status   = document.getElementById('filterStatus').value;
  const category = document.getElementById('filterCategory').value;
  const search   = document.getElementById('searchInput').value.toLowerCase();
  return tasks.filter(t =>
    (!owner    || t.owner === owner) &&
    (!status   || t.status === status) &&
    (!category || t.category === category) &&
    (!search   || t.name.toLowerCase().includes(search) || (t.note||'').toLowerCase().includes(search))
  );
}

function refreshFilters() {
  const owners = [...new Set(tasks.map(t=>t.owner).filter(Boolean))].sort();
  const cats   = [...new Set(tasks.map(t=>t.category).filter(Boolean))].sort();
  const fOwner = document.getElementById('filterOwner');
  const fCat   = document.getElementById('filterCategory');
  const selO = fOwner.value; const selC = fCat.value;
  fOwner.innerHTML = '<option value="">전체</option>' + owners.map(o=>`<option value="${o}">${o}</option>`).join('');
  fCat.innerHTML   = '<option value="">전체</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  fOwner.value = selO; fCat.value = selC;
}

/* ── SUMMARY ── */
function renderSummary() {
  const total = tasks.length;
  const done  = tasks.filter(t=>t.status==='done').length;
  const inProg= tasks.filter(t=>t.status==='progress').length;
  const delay = tasks.filter(t=>t.status==='delay').length;
  const avgPct= total ? Math.round(tasks.reduce((a,t)=>a+(+t.pct||0),0)/total) : 0;
  document.getElementById('summaryRow').innerHTML = `
    <div class="card"><div class="card-label">전체 작업</div><div class="card-value c-blue">${total}</div><div class="card-sub">총 등록 작업 수</div></div>
    <div class="card"><div class="card-label">진행중</div><div class="card-value c-yellow">${inProg}</div><div class="card-sub">현재 진행 중</div></div>
    <div class="card"><div class="card-label">완료</div><div class="card-value c-green">${done}</div><div class="card-sub">완료된 작업</div></div>
    <div class="card"><div class="card-label">평균 진행률</div><div class="card-value ${delay?'c-red':'c-green'}">${avgPct}%</div><div class="card-sub">지연 ${delay}건</div></div>
  `;
}

/* ── GANTT ── */
function renderGantt(filtered) {
  const months = parseInt(document.getElementById('ganttRange').value);
  const today = new Date(); today.setHours(0,0,0,0);
  const startDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
  const endDate   = new Date(startDate); endDate.setMonth(startDate.getMonth() + months);

  const totalDays = (endDate - startDate) / 86400000;

  // build month headers
  const monthHeaders = [];
  let cur = new Date(startDate);
  while (cur < endDate) {
    monthHeaders.push(new Date(cur));
    cur.setMonth(cur.getMonth() + 1);
  }

  function pct(date) {
    const d = new Date(date); d.setHours(0,0,0,0);
    return Math.max(0, Math.min(100, ((d - startDate) / 86400000) / totalDays * 100));
  }

  // today line pct
  const todayPct = pct(today);

  // month grid lines
  let gridLines = '';
  for (const m of monthHeaders) {
    const p = pct(m);
    if (p > 0 && p < 100) gridLines += `<div class="gantt-grid-line" style="left:${p}%"></div>`;
  }

  const nowLabel = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('ganttInfo').textContent = `오늘: ${nowLabel}  |  표시 기간: ${months}개월`;

  const isCurrentMonth = (m) => m.getFullYear()===today.getFullYear() && m.getMonth()===today.getMonth();

  let html = `
  <div class="gantt-header">
    <div class="gantt-info-cols">
      <div class="gantt-info-col col-name">작업명</div>
      <div class="gantt-info-col col-owner">담당자</div>
      <div class="gantt-info-col col-status">상태</div>
      <div class="gantt-info-col col-pct">진행률</div>
    </div>
    <div class="gantt-timeline">
      ${monthHeaders.map(m=>`<div class="gantt-month ${isCurrentMonth(m)?'current':''}">${m.getFullYear()}.${String(m.getMonth()+1).padStart(2,'0')}</div>`).join('')}
    </div>
  </div>`;

  if (!filtered.length) {
    html += `<div style="padding:32px;text-align:center;color:var(--muted)">조건에 맞는 작업이 없습니다.</div>`;
  }

  for (const t of filtered) {
    const s = STATUS[t.status] || STATUS.plan;
    const barLeft  = pct(t.start);
    const barRight = 100 - pct(t.end);
    const barWidth = Math.max(0.5, 100 - barLeft - barRight);
    const fillW    = Math.min(100, +t.pct || 0);

    const dStart = new Date(t.start).toLocaleDateString('ko-KR');
    const dEnd   = new Date(t.end).toLocaleDateString('ko-KR');
    const tip    = `${t.name}\n${dStart} ~ ${dEnd}\n담당: ${t.owner||'-'}\n진행률: ${t.pct||0}%\n${t.note||''}`;

    html += `
    <div class="gantt-row">
      <div class="gantt-row-info">
        <div class="gantt-cell col-name" title="${t.name}">${t.name}</div>
        <div class="gantt-cell col-owner">${t.owner||'-'}</div>
        <div class="gantt-cell col-status"><span class="badge ${s.badge}">${s.label}</span></div>
        <div class="gantt-cell col-pct">${t.pct||0}%</div>
      </div>
      <div class="gantt-bar-area">
        ${gridLines}
        <div class="gantt-today-line" style="left:${todayPct}%"></div>
        <div class="gantt-bar ${s.bar}" style="left:${barLeft}%;width:${barWidth}%" title="${tip}">
          <div class="gantt-bar-fill" style="width:${fillW}%"></div>
          <span class="gantt-bar-label">${barWidth>8?t.name:''}</span>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('ganttContainer').innerHTML = html;
}

/* ── TABLE ── */
function renderTable(filtered) {
  document.getElementById('tableCount').textContent = `${filtered.length}건`;
  const rows = filtered.map(t => {
    const s = STATUS[t.status]||STATUS.plan;
    const dStart = new Date(t.start).toLocaleDateString('ko-KR');
    const dEnd   = new Date(t.end).toLocaleDateString('ko-KR');
    const pctNum = +t.pct||0;
    const barColor = {plan:'var(--muted)',progress:'var(--accent)',done:'var(--accent3)',delay:'var(--danger)',hold:'var(--warn)'}[t.status]||'var(--muted)';
    return `<tr>
      <td><strong>${t.name}</strong>${t.category?`<br><span style="font-size:11px;color:var(--muted)">${t.category}</span>`:''}</td>
      <td style="color:var(--muted)">${t.category||'-'}</td>
      <td>${t.owner||'-'}</td>
      <td style="white-space:nowrap">${dStart}</td>
      <td style="white-space:nowrap">${dEnd}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="prog-wrap"><div class="prog-bar" style="width:${pctNum}%;background:${barColor}"></div></div>
          <span style="font-size:12px;color:var(--muted)">${pctNum}%</span>
        </div>
      </td>
      <td><span class="badge ${s.badge}">${s.label}</span></td>
      <td style="max-width:180px;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.note||''}">${t.note||'-'}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="editTask('${t.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">🗑</button>
      </td>
    </tr>`;
  });
  document.getElementById('tableBody').innerHTML = rows.join('') || `<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--muted)">데이터 없음</td></tr>`;
}

/* ── RENDER ── */
function render() {
  refreshFilters();
  renderSummary();
  const filtered = getFiltered();
  if (currentTab === 'gantt') renderGantt(filtered);
  else renderTable(filtered);
}

/* ── TAB ── */
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('ganttPanel').style.display = tab==='gantt' ? '' : 'none';
  document.getElementById('tablePanel').style.display = tab==='table' ? '' : 'none';
  render();
}

/* ── MODAL ── */
function openModal(id=null) {
  editId = id;
  const t = id ? tasks.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = id ? '작업 수정' : '작업 추가';
  document.getElementById('f_name').value     = t?.name||'';
  document.getElementById('f_category').value = t?.category||'';
  document.getElementById('f_owner').value    = t?.owner||'';
  document.getElementById('f_start').value    = t?.start||today_str();
  document.getElementById('f_end').value      = t?.end||'';
  document.getElementById('f_pct').value      = t?.pct??0;
  document.getElementById('f_status').value   = t?.status||'plan';
  document.getElementById('f_note').value     = t?.note||'';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }
function today_str() { return new Date().toISOString().slice(0,10); }

function saveTask() {
  const name  = document.getElementById('f_name').value.trim();
  const start = document.getElementById('f_start').value;
  const end   = document.getElementById('f_end').value;
  if (!name || !start || !end) { alert('작업명, 시작일, 종료일은 필수입니다.'); return; }
  if (start > end) { alert('종료일이 시작일보다 빠릅니다.'); return; }
  const obj = {
    id: editId || uid(), name,
    category: document.getElementById('f_category').value.trim(),
    owner:    document.getElementById('f_owner').value.trim(),
    start, end,
    pct:    parseInt(document.getElementById('f_pct').value)||0,
    status: document.getElementById('f_status').value,
    note:   document.getElementById('f_note').value.trim(),
  };
  if (editId) { const i = tasks.findIndex(t=>t.id===editId); tasks[i]=obj; }
  else tasks.push(obj);
  save(); closeModal(); render();
}
function editTask(id) { openModal(id); }
function deleteTask(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  tasks = tasks.filter(t=>t.id!==id); save(); render();
}

/* ── CSV ── */
function exportCSV() {
  const header = 'id,name,category,owner,start,end,pct,status,note';
  const rows = tasks.map(t=>[t.id,`"${(t.name||'').replace(/"/g,'""')}"`,`"${(t.category||'').replace(/"/g,'""')}"`,`"${(t.owner||'').replace(/"/g,'""')}"`,t.start,t.end,t.pct,t.status,`"${(t.note||'').replace(/"/g,'""')}"`].join(','));
  const blob = new Blob(['\uFEFF'+header+'\n'+rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`gantt_${today_str()}.csv`; a.click();
}
function importCSV() { document.getElementById('csvInput').click(); }
function handleCSV(e) {
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const lines = ev.target.result.replace(/\r/g,'').split('\n').filter(Boolean);
    const header = lines[0].split(',');
    const idx = k => header.indexOf(k);
    const parseField = s => s.replace(/^"|"$/g,'').replace(/""/g,'"');
    const newTasks = [];
    for (let i=1;i<lines.length;i++) {
      const cols = lines[i].match(/("(?:[^"]|"")*"|[^,]*)/g).map(parseField);
      const get = k => cols[idx(k)]||'';
      newTasks.push({ id:get('id')||uid(), name:get('name'), category:get('category'), owner:get('owner'),
        start:get('start'), end:get('end'), pct:parseInt(get('pct'))||0, status:get('status')||'plan', note:get('note') });
    }
    if (!newTasks.length) { alert('데이터가 없습니다.'); return; }
    if (confirm(`${newTasks.length}건을 가져오시겠습니까? (기존 데이터와 병합)`)) {
      const ids = new Set(tasks.map(t=>t.id));
      newTasks.forEach(t=>{ if(ids.has(t.id)){ const i=tasks.findIndex(x=>x.id===t.id); tasks[i]=t; } else tasks.push(t); });
      save(); render(); alert('완료!');
    }
  };
  r.readAsText(file,'UTF-8');
  e.target.value='';
}

/* ── INIT ── */
(async () => {
  await loadTasks();
  render();
})();
</script>
