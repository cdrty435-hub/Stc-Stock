<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>STC Stock App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card2: #21253a;
  --border: #2a2d3e;
  --accent: #4f8ef7;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; max-width: 480px; margin: 0 auto; min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 16px; font-weight: 700; color: var(--accent); }
.logo span { font-size: 11px; color: var(--text2); font-weight: 400; margin-left: 6px; }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--card2);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 53px; z-index: 99;
}
.tab {
  flex: 1; padding: 12px 4px; border: none; background: transparent;
  color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── PAGE ── */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── SCAN AREA ── */
.scan-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; margin-bottom: 16px;
}
.scan-header {
  padding: 12px 16px; background: var(--card2);
  font-size: 13px; font-weight: 600; color: var(--text2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.scan-area { position: relative; width: 100%; background: #000; }
#video-in, #video-out, #video-cancel { width: 100%; max-height: 220px; object-fit: cover; display: block; }
.scan-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 160px; height: 160px; border: 3px solid var(--accent);
  border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,.5);
  pointer-events: none;
}
.scan-line {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent); animation: scanLine 2s linear infinite;
  box-shadow: 0 0 8px var(--accent);
}
@keyframes scanLine { 0%{top:0} 100%{top:100%} }

.scan-btn {
  width: 100%; padding: 14px; border: none; cursor: pointer;
  font-size: 14px; font-weight: 700; transition: opacity .2s;
}
.scan-btn.green { background: var(--green); color: #000; }
.scan-btn.red   { background: var(--red);   color: #fff; }
.scan-btn.yellow{ background: var(--yellow); color: #000; }
.scan-btn:hover { opacity: .85; }
.scan-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── MANUAL INPUT ── */
.manual-row {
  display: flex; gap: 8px; padding: 10px 14px;
  border-top: 1px solid var(--border);
}
.manual-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 10px 12px;
  font-size: 14px; outline: none;
}
.manual-input:focus { border-color: var(--accent); }
.manual-btn {
  padding: 10px 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
}

/* ── PART INFO CARD ── */
.part-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 16px;
}
.part-card.found { border-color: var(--accent); }
.part-card.not-found { border-color: var(--red); }
.part-id-label { font-family: monospace; font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.part-desc { font-size: 14px; color: var(--text); margin-bottom: 10px; line-height: 1.4; }
.part-meta { display: flex; gap: 10px; flex-wrap: wrap; }
.meta-item { background: var(--card2); border-radius: 8px; padding: 6px 12px; font-size: 12px; }
.meta-label { color: var(--text2); margin-bottom: 2px; }
.meta-value { font-weight: 700; font-size: 15px; }
.meta-value.red    { color: var(--red); }
.meta-value.yellow { color: var(--yellow); }
.meta-value.green  { color: var(--green); }

.status-badge {
  display: inline-block; padding: 4px 12px; border-radius: 10px;
  font-size: 12px; font-weight: 700;
}
.st-CRITICAL { background: rgba(239,68,68,.2); color: var(--red); border: 1px solid var(--red); }
.st-Order    { background: rgba(245,158,11,.2); color: var(--yellow); border: 1px solid var(--yellow); }
.st-Enough   { background: rgba(34,197,94,.2); color: var(--green); border: 1px solid var(--green); }

/* ── FORM ── */
.form-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 16px;
}
.form-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .5px; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 11px 14px;
  font-size: 15px; outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-input[type=number] { font-size: 22px; font-weight: 700; text-align: center; }

.qty-row { display: flex; gap: 8px; align-items: center; }
.qty-btn {
  width: 46px; height: 46px; border: 1px solid var(--border);
  background: var(--card2); color: var(--text); border-radius: 8px;
  font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.qty-btn:active { background: var(--accent); color: #fff; }

/* ── SUBMIT BTN ── */
.submit-btn {
  width: 100%; padding: 16px; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px;
  transition: opacity .2s; letter-spacing: .5px;
}
.submit-btn.in     { background: var(--green); color: #000; }
.submit-btn.out    { background: var(--red);   color: #fff; }
.submit-btn.cancel { background: var(--yellow); color: #000; }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }
.reset-btn {
  width: 100%; padding: 11px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); border-radius: 10px;
  font-size: 14px; cursor: pointer;
}

/* ── RECENT LOG ── */
.log-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
}
.log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.log-txid { font-family: monospace; font-size: 12px; color: var(--accent); }
.log-date { font-size: 11px; color: var(--text2); }
.log-desc { font-size: 13px; color: var(--text); margin-bottom: 4px; }
.log-meta { display: flex; gap: 8px; font-size: 12px; color: var(--text2); }
.log-qty-in  { color: var(--green); font-weight: 700; }
.log-qty-out { color: var(--red);   font-weight: 700; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600;
  z-index: 9999; opacity: 0; transition: opacity .3s; white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { background: var(--green); color: #000; }
.toast.error   { background: var(--red);   color: #fff; }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 9998; display: none;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty { padding: 40px; text-align: center; color: var(--text2); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">STC <span>Stock App</span></div>
  <div style="font-size:11px;color:var(--text2)" id="workerDisplay">담당자 미설정</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('in',this)">📥 IN 입고</button>
  <button class="tab" onclick="showTab('out',this)">📤 OUT 출고</button>
  <button class="tab" onclick="showTab('cancel',this)">↩️ CANCEL</button>
  <button class="tab" onclick="showTab('log',this)">📋 기록</button>
</div>

<!-- ══ IN 입고 ══ -->
<div class="page active" id="page-in">

  <div class="scan-box">
    <div class="scan-header">
      <span>📷 QR 스캔</span>
      <span id="scan-status-in" style="font-size:11px;color:var(--green)"></span>
    </div>
    <div class="scan-area" id="scan-area-in" style="display:none">
      <video id="video-in" autoplay playsinline muted></video>
      <div class="scan-overlay"><div class="scan-line"></div></div>
    </div>
    <button class="scan-btn green" id="scanBtn-in" onclick="startScan('in')">📷 카메라 스캔 시작</button>
    <div class="manual-row">
      <input class="manual-input" id="manual-in" placeholder="PART ID 직접 입력 (예: KR-001)" 
             onkeydown="if(event.key==='Enter') manualSearch('in')">
      <button class="manual-btn" onclick="manualSearch('in')">검색</button>
    </div>
  </div>

  <div id="partCard-in"></div>

  <div id="formBox-in" style="display:none">
    <div class="form-box">
      <div class="form-title">📥 입고 정보 입력</div>
      <div class="form-group">
        <label class="form-label">수량 QTY</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty('in',-1)">−</button>
          <input class="form-input" type="number" id="qty-in" value="1" min="1">
          <button class="qty-btn" onclick="changeQty('in',1)">+</button>
        </div>
      </div>

        <input class="form-input" id="remark-in" placeholder="(선택)">

    </div>
    <button class="submit-btn in" onclick="submitForm('IN')">📥 입고 등록</button>
    <button class="reset-btn" onclick="resetForm('in')">↺ 다시 스캔</button>
  </div>
</div>

<!-- ══ OUT 출고 ══ -->
<div class="page" id="page-out">

  <div class="scan-box">
    <div class="scan-header">
      <span>📷 QR 스캔</span>
      <span id="scan-status-out" style="font-size:11px;color:var(--green)"></span>
    </div>
    <div class="scan-area" id="scan-area-out" style="display:none">
      <video id="video-out" autoplay playsinline muted></video>
      <div class="scan-overlay"><div class="scan-line"></div></div>
    </div>
    <button class="scan-btn red" id="scanBtn-out" onclick="startScan('out')">📷 카메라 스캔 시작</button>
    <div class="manual-row">
      <input class="manual-input" id="manual-out" placeholder="PART ID 직접 입력 (예: KR-001)"
             onkeydown="if(event.key==='Enter') manualSearch('out')">
      <button class="manual-btn" onclick="manualSearch('out')">검색</button>
    </div>
  </div>

  <div id="partCard-out"></div>

  <div id="formBox-out" style="display:none">
    <div class="form-box">
      <div class="form-title">📤 출고 정보 입력</div>
      <div class="form-group">
        <label class="form-label">수량 QTY</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty('out',-1)">−</button>
          <input class="form-input" type="number" id="qty-out" value="1" min="1">
          <button class="qty-btn" onclick="changeQty('out',1)">+</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">담당자 Worker</label>
        <input class="form-input" id="worker-out" placeholder="이름 입력">
      </div>
      <div class="form-group">
        <label class="form-label">설비번호 Machine</label>
        <input class="form-input" id="machine-out" placeholder="예: D/C-10">
      </div>
      <div class="form-group">
        <label class="form-label">비고 Remark</label>
        <input class="form-input" id="remark-out" placeholder="(선택)">
      </div>
    </div>
    <button class="submit-btn out" onclick="submitForm('OUT')">📤 출고 등록</button>
    <button class="reset-btn" onclick="resetForm('out')">↺ 다시 스캔</button>
  </div>
</div>

<!-- ══ CANCEL 취소 ══ -->
<div class="page" id="page-cancel">

  <div class="scan-box">
    <div class="scan-header">
      <span>📷 QR 스캔</span>
      <span id="scan-status-cancel" style="font-size:11px;color:var(--yellow)"></span>
    </div>
    <div class="scan-area" id="scan-area-cancel" style="display:none">
      <video id="video-cancel" autoplay playsinline muted></video>
      <div class="scan-overlay"><div class="scan-line"></div></div>
    </div>
    <button class="scan-btn yellow" id="scanBtn-cancel" onclick="startScan('cancel')">📷 카메라 스캔 시작</button>
    <div class="manual-row">
      <input class="manual-input" id="manual-cancel" placeholder="PART ID 직접 입력 (예: KR-001)"
             onkeydown="if(event.key==='Enter') manualSearch('cancel')">
      <button class="manual-btn" onclick="manualSearch('cancel')">검색</button>
    </div>
  </div>

  <div id="partCard-cancel"></div>

  <div id="formBox-cancel" style="display:none">
    <div class="form-box">
      <div class="form-title">↩️ 취소 정보 입력</div>
      <div class="form-group">
        <label class="form-label">취소 유형</label>
        <select class="form-select" id="cancelType">
          <option value="CANCEL-IN">IN 입고 취소</option>

      </div>
      <div class="form-group">
        <label class="form-label">취소 수량 QTY</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty('cancel',-1)">−</button>
          <input class="form-input" type="number" id="qty-cancel" value="1" min="1">
          <button class="qty-btn" onclick="changeQty('cancel',1)">+</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">담당자 Worker</label>
        <input class="form-input" id="worker-cancel" placeholder="이름 입력">
      </div>
      <div class="form-group">
        <label class="form-label">취소 사유</label>
        <input class="form-input" id="remark-cancel" placeholder="사유 입력">
      </div>
    </div>
    <button class="submit-btn cancel" onclick="submitForm('CANCEL')">↩️ 취소 등록</button>
    <button class="reset-btn" onclick="resetForm('cancel')">↺ 다시 스캔</button>

</div>

<!-- ══ LOG 기록 ══ -->
<div class="page" id="page-log">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:13px;font-weight:600;color:var(--text2)">최근 입출고 기록</div>
    <button onclick="loadLog()" style="padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer">🔄 새로고침</button>
  </div>
  <div id="logList"><div class="empty">기록 탭 클릭 시 자동 로드됩니다</div></div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwYeBSYC_C23l2n_sBki0rQLHSzBlA-podGjLTlIgMGapIA8YGf9H2AcVxhmr4_Ryv3dQ/exec';
const PARTS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=579504195&single=true&output=csv';
const IN_CSV    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=1549476870&single=true&output=csv';
const OUT_CSV   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=2040284431&single=true&output=csv';

let PARTS = [];
let currentPart = {};
let scanStreams = {};
let scanAnimFrames = {};

// ── CSV 파서 ──
function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2) return [];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(let c of line){
      if(c==='"') inQ=!inQ;
      else if(c===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}

// ── 파트 로드 ──
async function loadParts(){
  if(PARTS.length>0) return;
  try{
    const res=await fetch(PARTS_CSV);
    const text=await res.text();
    PARTS=parseCSV(text);
  }catch(e){ console.error('파트 로드 실패',e); }
}

// ── 파트 검색 ──
function findPart(id){
  const clean=id.trim().toUpperCase();
  // PART_ID로 찾기
  let p=PARTS.find(p=>p.PART_ID===clean);
  // QR_DATA로 찾기 (QR에 "KR-001 | Description" 형식)
  if(!p) p=PARTS.find(p=>(p.QR_DATA||'').toUpperCase().startsWith(clean));
  // Description으로 찾기
  if(!p) p=PARTS.find(p=>(p.DESCRIPTION||'').toLowerCase().includes(id.toLowerCase()));
  return p||null;
}

// ── 파트 카드 렌더 ──
function renderPartCard(tab, part){
  const cur=parseFloat(part.CURRENT_STOCK)||0;
  const min=parseFloat(part.MIN)||0;
  const st=cur===0?'CRITICAL':cur<min?'Order':'Enough';
  const stColor=cur===0?'red':cur<min?'yellow':'green';
  document.getElementById('partCard-'+tab).innerHTML=`
    <div class="part-card found">
      <div class="part-id-label">${part.PART_ID}</div>
      <div class="part-desc">${part.DESCRIPTION||''}</div>
      <div style="margin-bottom:10px"><span class="status-badge st-${st}">${st}</span></div>
      <div class="part-meta">
        <div class="meta-item">
          <div class="meta-label">현재고 STOCK</div>
          <div class="meta-value ${stColor}">${cur}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">MIN</div>
          <div class="meta-value">${part.MIN||0}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">MAX</div>
          <div class="meta-value">${part.MAX||0}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">위치</div>
          <div class="meta-value" style="font-size:12px">${part.GROUP||''}</div>
        </div>
      </div>
    </div>`;
  // 담당자 자동 채우기
  const saved=localStorage.getItem('stc_worker')||'';
  if(saved){
    const wEl=document.getElementById('worker-'+tab);
    if(wEl&&!wEl.value) wEl.value=saved;
  }
  document.getElementById('formBox-'+tab).style.display='block';
  stopScan(tab);
}

function renderPartNotFound(tab, id){
  document.getElementById('partCard-'+tab).innerHTML=`
    <div class="part-card not-found">
      <div style="color:var(--red);font-weight:700;margin-bottom:6px">❌ 파트를 찾을 수 없습니다</div>
      <div style="font-size:13px;color:var(--text2)">"${id}"</div>
    </div>`;
}

// ── QR 스캔 ──
async function startScan(tab){
  await loadParts();
  const area=document.getElementById('scan-area-'+tab);
  const video=document.getElementById('video-'+tab);
  const btn=document.getElementById('scanBtn-'+tab);
  area.style.display='block';
  btn.textContent='⏹ 스캔 중지';
  btn.onclick=()=>stopScan(tab);
  try{
    // 고해상도 후면 카메라 요청
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{exact:'environment'},
        width:{ideal:1280},
        height:{ideal:720}
      },
      audio:false
    }).catch(()=>
      // exact 실패시 일반 후면 카메라
      navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment', width:{ideal:1280}, height:{ideal:720}},
        audio:false
      })
    );
    scanStreams[tab]=stream;
    video.srcObject=stream;
    await video.play();
    scanFrame(tab,video);
    document.getElementById('scan-status-'+tab).textContent='📷 QR코드를 박스 안에 맞추세요';
  }catch(e){
    showToast('카메라 접근 불가: '+e.message,'error');
    stopScan(tab);
  }
}

function scanFrame(tab,video){
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d',{willReadFrequently:true});
  let lastScan=0;

  function tick(ts){
    if(!scanStreams[tab]) return;

    // 100ms 간격으로 스캔 (너무 빠르면 오히려 실패)
    if(ts-lastScan>100){
      lastScan=ts;
      if(video.readyState===video.HAVE_ENOUGH_DATA && video.videoWidth>0){
        const w=video.videoWidth;
        const h=video.videoHeight;
        canvas.width=w;
        canvas.height=h;
        ctx.drawImage(video,0,0,w,h);

        // 전체 이미지로 먼저 시도
        let img=ctx.getImageData(0,0,w,h);
        let code=jsQR(img.data,w,h,{inversionAttempts:'attemptBoth'});

        // 안되면 중앙 크롭해서 재시도
        if(!code){
          const cx=Math.floor(w*0.15), cy=Math.floor(h*0.15);
          const cw=Math.floor(w*0.7),  ch=Math.floor(h*0.7);
          img=ctx.getImageData(cx,cy,cw,ch);
          code=jsQR(img.data,cw,ch,{inversionAttempts:'attemptBoth'});
        }

        if(code && code.data){
          const qrText=code.data.trim();
          document.getElementById('scan-status-'+tab).textContent='✅ 인식됨!';
          stopScan(tab);
          // PART_ID 추출 (형식: "KR-001 | Description" 또는 "KR-001")
          const partId=qrText.split('|')[0].trim();
          const found=findPart(partId);
          if(found){ currentPart=found; renderPartCard(tab,found); }
          else renderPartNotFound(tab,qrText);
          return;
        }
      }
    }
    scanAnimFrames[tab]=requestAnimationFrame(tick);
  }
  scanAnimFrames[tab]=requestAnimationFrame(tick);
}

function stopScan(tab){
  if(scanStreams[tab]){
    scanStreams[tab].getTracks().forEach(t=>t.stop());
    delete scanStreams[tab];
  }
  if(scanAnimFrames[tab]){
    cancelAnimationFrame(scanAnimFrames[tab]);
    delete scanAnimFrames[tab];
  }
  const area=document.getElementById('scan-area-'+tab);
  const btn=document.getElementById('scanBtn-'+tab);
  if(area) area.style.display='none';
  if(btn){
    const labels={in:'📷 카메라 스캔 시작',out:'📷 카메라 스캔 시작',cancel:'📷 카메라 스캔 시작'};
    const cls={in:'green',out:'red',cancel:'yellow'};
    btn.textContent=labels[tab];
    btn.className='scan-btn '+cls[tab];
    btn.onclick=()=>startScan(tab);
  }
  document.getElementById('scan-status-'+tab).textContent='';
}

// ── 수동 검색 ──
async function manualSearch(tab){
  await loadParts();
  const val=document.getElementById('manual-'+tab).value.trim();
  if(!val){ showToast('PART ID를 입력하세요','error'); return; }
  const found=findPart(val);
  if(found){ currentPart=found; renderPartCard(tab,found); }
  else renderPartNotFound(tab,val);
}

// ── 수량 변경 ──
function changeQty(tab,delta){
  const el=document.getElementById('qty-'+tab);
  const v=parseInt(el.value)||1;
  el.value=Math.max(1,v+delta);
}

// ── 폼 초기화 ──
function resetForm(tab){
  currentPart={};
  document.getElementById('partCard-'+tab).innerHTML='';
  document.getElementById('formBox-'+tab).style.display='none';
  document.getElementById('manual-'+tab).value='';
  document.getElementById('qty-'+tab).value=1;
  if(document.getElementById('machine-'+tab)) document.getElementById('machine-'+tab).value='';
  if(document.getElementById('remark-'+tab)) document.getElementById('remark-'+tab).value='';
}

// ── 제출 ──
async function submitForm(type){
  if(!currentPart.PART_ID){ showToast('파트를 먼저 스캔하세요','error'); return; }
  const tab=type==='IN'?'in':type==='OUT'?'out':'cancel';
  const qty=parseInt(document.getElementById('qty-'+tab).value)||1;
  const worker=document.getElementById('worker-'+tab).value.trim();
  if(!worker){ showToast('담당자를 입력하세요','error'); return; }

  // 담당자 저장
  localStorage.setItem('stc_worker',worker);
  document.getElementById('workerDisplay').textContent=worker;

  const payload={
    type: type,
    partId: currentPart.PART_ID,
    description: currentPart.DESCRIPTION,
    qty: qty,
    worker: worker,
    machine: document.getElementById('machine-out')?document.getElementById('machine-out').value:'',
    remark: document.getElementById('remark-'+tab)?document.getElementById('remark-'+tab).value:''
  };

  if(type==='CANCEL'){
    payload.type=document.getElementById('cancelType').value.startsWith('CANCEL-IN')?'IN':'OUT';
    payload.qty=-Math.abs(qty);
    payload.remark='CANCEL: '+(document.getElementById('remark-cancel').value||'취소');
  }

  showLoading(true);
  try{
    const res=await fetch(API_URL,{
      method:'POST',
      body:JSON.stringify(payload)
    });
    const data=await res.json();
    showLoading(false);
    if(data.success){
      showToast(`✅ ${type} 완료! (${payload.partId} × ${Math.abs(qty)})`, 'success');
      // 로컬 로그 저장
      saveLocalLog({...payload, txId: data.txId, date: new Date().toLocaleDateString('ko-KR')});
      setTimeout(()=>resetForm(tab),1500);
    }else{
      showToast('❌ 저장 실패: '+data.error,'error');
    }
  }catch(e){
    showLoading(false);
    showToast('❌ 오류: '+e.message,'error');
  }
}

// ── 로컬 로그 ──
function saveLocalLog(item){
  const logs=JSON.parse(localStorage.getItem('stc_logs')||'[]');
  logs.unshift(item);
  localStorage.setItem('stc_logs',JSON.stringify(logs.slice(0,50)));
}

function loadLog(){
  const logs=JSON.parse(localStorage.getItem('stc_logs')||'[]');
  const el=document.getElementById('logList');
  if(!logs.length){
    el.innerHTML='<div class="empty">아직 기록이 없습니다</div>';
    return;
  }
  el.innerHTML=logs.map(l=>`
    <div class="log-item">
      <div class="log-header">
        <span class="log-txid">${l.txId||'-'} · ${l.type}</span>
        <span class="log-date">${l.date||''}</span>
      </div>
      <div class="log-desc">${l.partId} | ${l.description||''}</div>
      <div class="log-meta">
        <span class="${l.qty>0?'log-qty-in':'log-qty-out'}">${l.qty>0?'+':''}${l.qty}개</span>
        <span>· ${l.worker||''}</span>
        ${l.machine?`<span>· ${l.machine}</span>`:''}
        ${l.remark?`<span>· ${l.remark}</span>`:''}
      </div>
    </div>`).join('');
}

// ── 탭 전환 ──
function showTab(name,btn){
  // 스캔 중지
  ['in','out','cancel'].forEach(t=>stopScan(t));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='log') loadLog();
}

// ── 유틸 ──
function showLoading(v){ document.getElementById('loadingOverlay').className='loading-overlay'+(v?' show':''); }
function showToast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  setTimeout(()=>el.className='toast',2500);
}

// ── 초기화 ──
window.addEventListener('load',async()=>{
  // 담당자 복원
  const saved=localStorage.getItem('stc_worker');
  if(saved) document.getElementById('workerDisplay').textContent=saved;
  // 파트 미리 로드
  await loadParts();
});
</script>
