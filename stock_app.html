<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>STC Stock App</title>
<style>
:root {
  --bg: #0f1117; --card: #1a1d27; --card2: #21253a; --border: #2a2d3e;
  --accent: #4f8ef7; --text: #e2e8f0; --text2: #94a3b8;
  --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --blue: #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Inter',sans-serif; font-size: 15px; max-width: 520px; margin: 0 auto; min-height: 100vh; }

.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 16px; font-weight: 700; color: var(--accent); }
.logo span { font-size: 11px; color: var(--text2); font-weight: 400; margin-left: 6px; }

.tabs { display: flex; background: var(--card2); border-bottom: 1px solid var(--border); position: sticky; top: 53px; z-index: 99; }
.tab { flex: 1; padding: 13px 4px; border: none; background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.page { display: none; padding: 14px; }
.page.active { display: block; }

/* ── CAMERA ── */
.scan-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
.scan-header { padding: 11px 16px; background: var(--card2); font-size: 13px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.scan-area { position: relative; width: 100%; background: #000; }

/* 카메라 창 크게 */
#video-in, #video-out, #video-cancel {
  width: 100%; height: 320px; object-fit: cover; display: block;
}
.scan-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 220px; height: 220px;
  border: 3px solid var(--accent); border-radius: 16px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,.55);
  pointer-events: none;
}
.corner { position: absolute; width: 28px; height: 28px; border-color: var(--accent); border-style: solid; }
.corner-tl { top: -3px; left: -3px; border-width: 4px 0 0 4px; border-radius: 4px 0 0 0; }
.corner-tr { top: -3px; right: -3px; border-width: 4px 4px 0 0; border-radius: 0 4px 0 0; }
.corner-bl { bottom: -3px; left: -3px; border-width: 0 0 4px 4px; border-radius: 0 0 0 4px; }
.corner-br { bottom: -3px; right: -3px; border-width: 0 4px 4px 0; border-radius: 0 0 4px 0; }
.scan-line { position: absolute; left: 4px; right: 4px; height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: scanLine 1.8s ease-in-out infinite; box-shadow: 0 0 8px var(--accent); }
@keyframes scanLine { 0%{top:4px} 50%{top:calc(100% - 7px)} 100%{top:4px} }

.scan-hint { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-size: 12px; color: rgba(255,255,255,.7); }

.scan-btn { width: 100%; padding: 16px; border: none; cursor: pointer; font-size: 15px; font-weight: 700; transition: opacity .2s; }
.scan-btn.green { background: var(--green); color: #000; }
.scan-btn.red   { background: var(--red);   color: #fff; }
.scan-btn.yellow{ background: var(--yellow); color: #000; }
.scan-btn:active { opacity: .8; }

.manual-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); }
.manual-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; }
.manual-input:focus { border-color: var(--accent); }
.manual-btn { padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }

/* ── PART CARD ── */
.part-card { background: var(--card); border: 2px solid var(--accent); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.part-card.err { border-color: var(--red); }
.part-id-big { font-family: monospace; font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.part-desc { font-size: 14px; color: var(--text); margin-bottom: 12px; line-height: 1.4; }
.part-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.meta-item { background: var(--card2); border-radius: 8px; padding: 8px 14px; min-width: 70px; flex: 1; }
.meta-label { color: var(--text2); font-size: 11px; margin-bottom: 3px; }
.meta-value { font-weight: 700; font-size: 18px; }
.c-red { color: var(--red); } .c-yellow { color: var(--yellow); } .c-green { color: var(--green); }
.st-badge { display: inline-block; padding: 4px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
.st-CRITICAL { background: rgba(239,68,68,.2); color: var(--red); border: 1px solid var(--red); }
.st-Order    { background: rgba(245,158,11,.2); color: var(--yellow); border: 1px solid var(--yellow); }
.st-Enough   { background: rgba(34,197,94,.2);  color: var(--green);  border: 1px solid var(--green); }

/* ── FORM ── */
.form-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.form-title { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .5px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input, .form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px 14px; font-size: 15px; outline: none; }
.form-input:focus { border-color: var(--accent); }
.form-input[type=number] { font-size: 26px; font-weight: 700; text-align: center; }

.qty-row { display: flex; gap: 8px; align-items: center; }
.qty-btn { width: 52px; height: 52px; border: 1px solid var(--border); background: var(--card2); color: var(--text); border-radius: 10px; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.qty-btn:active { background: var(--accent); color: #fff; }

.submit-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; margin-bottom: 10px; letter-spacing: .3px; }
.submit-btn.in     { background: var(--green); color: #000; }
.submit-btn.out    { background: var(--red);   color: #fff; }
.submit-btn.cancel { background: var(--yellow); color: #000; }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }
.reset-btn { width: 100%; padding: 13px; border: 1px solid var(--border); background: transparent; color: var(--text2); border-radius: 10px; font-size: 14px; cursor: pointer; }

/* ── LOG ── */
.log-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.log-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
.log-txid { font-family: monospace; font-size: 12px; color: var(--accent); }
.log-date { font-size: 11px; color: var(--text2); }
.log-desc { font-size: 13px; margin-bottom: 4px; }
.log-meta { font-size: 12px; color: var(--text2); }
.q-in  { color: var(--green); font-weight: 700; }
.q-out { color: var(--red);   font-weight: 700; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity .3s; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.success { background: var(--green); color: #000; }
.toast.error   { background: var(--red);   color: #fff; }

.loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 9998; }
.loading-overlay.show { display: flex; }
.spinner { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { padding: 40px; text-align: center; color: var(--text2); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">STC <span>Stock App</span></div>
  <div style="font-size:11px;color:var(--text2)" id="workerDisplay">담당자 미설정</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('in',this)">📥 IN</button>
  <button class="tab" onclick="showTab('out',this)">📤 OUT</button>
  <button class="tab" onclick="showTab('cancel',this)">↩️ CANCEL</button>
  <button class="tab" onclick="showTab('log',this)">📋 기록</button>
</div>

<!-- IN -->
<div class="page active" id="page-in">
  <div class="scan-box">
    <div class="scan-header">
      <span>📷 QR 스캔 — 입고 IN</span>
      <span id="ss-in" style="font-size:11px;color:var(--green)"></span>
    </div>
    <div class="scan-area" id="sa-in" style="display:none">
      <video id="vid-in" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div><div class="corner corner-br"></div>
        <div class="scan-line"></div>
      </div>
      <div class="scan-hint">QR코드를 사각형 안에 맞추세요</div>
    </div>
    <button class="scan-btn green" id="sb-in" onclick="startScan('in')">📷 카메라로 QR 스캔</button>
    <div class="manual-row">
      <input class="manual-input" id="mn-in" placeholder="PART ID 직접 입력 (KR-001)" onkeydown="if(event.key==='Enter')manualSearch('in')">
      <button class="manual-btn" onclick="manualSearch('in')">검색</button>
    </div>
  </div>
  <div id="pc-in"></div>
  <div id="fb-in" style="display:none">
    <div class="form-box">
      <div class="form-title">📥 입고 정보</div>
      <div class="form-group">
        <label class="form-label">수량 QTY</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="chgQty('in',-1)">−</button>
          <input class="form-input" type="number" id="qty-in" value="1" min="1">
          <button class="qty-btn" onclick="chgQty('in',1)">+</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">담당자</label><input class="form-input" id="wk-in" placeholder="이름"></div>
      <div class="form-group"><label class="form-label">비고</label><input class="form-input" id="rm-in" placeholder="(선택)"></div>
    </div>
    <button class="submit-btn in" onclick="submit('IN')">📥 입고 등록</button>
    <button class="reset-btn" onclick="reset('in')">↺ 다시 스캔</button>
  </div>
</div>

<!-- OUT -->
<div class="page" id="page-out">
  <div class="scan-box">
    <div class="scan-header">
      <span>📷 QR 스캔 — 출고 OUT</span>
      <span id="ss-out" style="font-size:11px;color:var(--red)"></span>
    </div>
    <div class="scan-area" id="sa-out" style="display:none">
      <video id="vid-out" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div><div class="corner corner-br"></div>
        <div class="scan-line"></div>
      </div>
      <div class="scan-hint">QR코드를 사각형 안에 맞추세요</div>
    </div>
    <button class="scan-btn red" id="sb-out" onclick="startScan('out')">📷 카메라로 QR 스캔</button>
    <div class="manual-row">
      <input class="manual-input" id="mn-out" placeholder="PART ID 직접 입력 (KR-001)" onkeydown="if(event.key==='Enter')manualSearch('out')">
      <button class="manual-btn" onclick="manualSearch('out')">검색</button>
    </div>
  </div>
  <div id="pc-out"></div>
  <div id="fb-out" style="display:none">
    <div class="form-box">
      <div class="form-title">📤 출고 정보</div>
      <div class="form-group">
        <label class="form-label">수량 QTY</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="chgQty('out',-1)">−</button>
          <input class="form-input" type="number" id="qty-out" value="1" min="1">
          <button class="qty-btn" onclick="chgQty('out',1)">+</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">담당자</label><input class="form-input" id="wk-out" placeholder="이름"></div>
      <div class="form-group"><label class="form-label">설비번호</label><input class="form-input" id="mc-out" placeholder="예: D/C-10"></div>
      <div class="form-group"><label class="form-label">비고</label><input class="form-input" id="rm-out" placeholder="(선택)"></div>
    </div>
    <button class="submit-btn out" onclick="submit('OUT')">📤 출고 등록</button>
    <button class="reset-btn" onclick="reset('out')">↺ 다시 스캔</button>
  </div>
</div>

<!-- CANCEL -->
<div class="page" id="page-cancel">
  <div class="scan-box">
    <div class="scan-header">
      <span>📷 QR 스캔 — 취소 CANCEL</span>
      <span id="ss-cancel" style="font-size:11px;color:var(--yellow)"></span>
    </div>
    <div class="scan-area" id="sa-cancel" style="display:none">
      <video id="vid-cancel" autoplay playsinline muted></video>
      <div class="scan-overlay">
        <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div><div class="corner corner-br"></div>
        <div class="scan-line"></div>
      </div>
      <div class="scan-hint">QR코드를 사각형 안에 맞추세요</div>
    </div>
    <button class="scan-btn yellow" id="sb-cancel" onclick="startScan('cancel')">📷 카메라로 QR 스캔</button>
    <div class="manual-row">
      <input class="manual-input" id="mn-cancel" placeholder="PART ID 직접 입력 (KR-001)" onkeydown="if(event.key==='Enter')manualSearch('cancel')">
      <button class="manual-btn" onclick="manualSearch('cancel')">검색</button>
    </div>
  </div>
  <div id="pc-cancel"></div>
  <div id="fb-cancel" style="display:none">
    <div class="form-box">
      <div class="form-title">↩️ 취소 정보</div>
      <div class="form-group">
        <label class="form-label">취소 유형</label>
        <select class="form-select" id="ct-cancel">
          <option value="IN">IN 입고 취소</option>
          <option value="OUT">OUT 출고 취소</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">취소 수량</label>
        <div class="qty-row">
          <button class="qty-btn" onclick="chgQty('cancel',-1)">−</button>
          <input class="form-input" type="number" id="qty-cancel" value="1" min="1">
          <button class="qty-btn" onclick="chgQty('cancel',1)">+</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">담당자</label><input class="form-input" id="wk-cancel" placeholder="이름"></div>
      <div class="form-group"><label class="form-label">취소 사유</label><input class="form-input" id="rm-cancel" placeholder="사유 입력"></div>
    </div>
    <button class="submit-btn cancel" onclick="submit('CANCEL')">↩️ 취소 등록</button>
    <button class="reset-btn" onclick="reset('cancel')">↺ 다시 스캔</button>
  </div>
</div>

<!-- LOG -->
<div class="page" id="page-log">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:13px;font-weight:600;color:var(--text2)">최근 입출고 기록</div>
    <button onclick="loadLog()" style="padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer">🔄 새로고침</button>
  </div>
  <div id="logList"><div class="empty">기록이 없습니다</div></div>
</div>

<div class="loading-overlay" id="loadingOv"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const API  = 'https://script.google.com/macros/s/AKfycbwYeBSYC_C23l2n_sBki0rQLHSzBlA-podGjLTlIgMGapIA8YGf9H2AcVxhmr4_Ryv3dQ/exec';
const PCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=579504195&single=true&output=csv';

let PARTS=[], curPart={}, streams={}, detectors={}, timers={};

function parseCSV(t){
  const L=t.trim().split('\n'); if(L.length<2) return [];
  const H=L[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return L.slice(1).map(l=>{
    const v=[]; let c='',q=false;
    for(const ch of l){ if(ch==='"')q=!q; else if(ch===','&&!q){v.push(c.trim());c='';}else c+=ch; }
    v.push(c.trim());
    const o={}; H.forEach((h,i)=>o[h]=(v[i]||'').replace(/^"|"$/g,'')); return o;
  });
}

async function loadParts(){
  if(PARTS.length) return;
  try{ const r=await fetch(PCSV); PARTS=parseCSV(await r.text()); }
  catch(e){ console.error(e); }
}

function findPart(id){
  const s=id.trim().toUpperCase();
  return PARTS.find(p=>p.PART_ID===s)
      || PARTS.find(p=>(p.QR_DATA||'').toUpperCase().startsWith(s))
      || null;
}

function renderCard(tab, part){
  const cur=parseFloat(part.CURRENT_STOCK)||0, min=parseFloat(part.MIN)||0;
  const st=cur===0?'CRITICAL':cur<min?'Order':'Enough';
  const cc=cur===0?'c-red':cur<min?'c-yellow':'c-green';
  document.getElementById('pc-'+tab).innerHTML=`
    <div class="part-card">
      <div class="part-id-big">${part.PART_ID}</div>
      <div class="part-desc">${part.DESCRIPTION||''}</div>
      <div style="margin-bottom:10px"><span class="st-badge st-${st}">${st}</span></div>
      <div class="part-meta">
        <div class="meta-item"><div class="meta-label">현재고</div><div class="meta-value ${cc}">${cur}</div></div>
        <div class="meta-item"><div class="meta-label">MIN</div><div class="meta-value">${part.MIN||0}</div></div>
        <div class="meta-item"><div class="meta-label">MAX</div><div class="meta-value">${part.MAX||0}</div></div>
        <div class="meta-item"><div class="meta-label">그룹</div><div class="meta-value" style="font-size:13px">${part.GROUP||''}</div></div>
      </div>
    </div>`;
  const saved=localStorage.getItem('stc_worker')||'';
  ['in','out','cancel'].forEach(t=>{ const e=document.getElementById('wk-'+t); if(e&&!e.value&&saved) e.value=saved; });
  document.getElementById('fb-'+tab).style.display='block';
  stopScan(tab);
}

function renderErr(tab,id){
  document.getElementById('pc-'+tab).innerHTML=`
    <div class="part-card err">
      <div style="color:var(--red);font-weight:700;margin-bottom:6px">❌ 파트를 찾을 수 없습니다</div>
      <div style="font-size:13px;color:var(--text2)">${id}</div>
    </div>`;
}

// ── BarcodeDetector 기반 스캔 ──
async function startScan(tab){
  await loadParts();

  // BarcodeDetector 지원 여부 확인
  if(!('BarcodeDetector' in window)){
    showToast('이 브라우저는 QR 스캔을 지원하지 않습니다. PART ID를 직접 입력해주세요.','error');
    return;
  }

  const area=document.getElementById('sa-'+tab);
  const video=document.getElementById('vid-'+tab);
  const btn=document.getElementById('sb-'+tab);
  const status=document.getElementById('ss-'+tab);

  area.style.display='block';
  btn.textContent='⏹ 스캔 중지';
  btn.onclick=()=>stopScan(tab);

  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} },
      audio:false
    });
    streams[tab]=stream;
    video.srcObject=stream;
    await video.play();
    status.textContent='📷 QR을 사각형에 맞추세요';

    // BarcodeDetector 생성
    detectors[tab]=new BarcodeDetector({formats:['qr_code']});

    // 500ms 간격으로 감지
    timers[tab]=setInterval(async()=>{
      if(!streams[tab]) return;
      try{
        const codes=await detectors[tab].detect(video);
        if(codes.length>0){
          const qrText=codes[0].rawValue.trim();
          status.textContent='✅ 인식됨!';
          stopScan(tab);
          const partId=qrText.split('|')[0].trim();
          const found=findPart(partId);
          if(found){ curPart=found; renderCard(tab,found); }
          else renderErr(tab,qrText);
        }
      }catch(e){}
    }, 500);

  }catch(e){
    showToast('카메라 오류: '+e.message,'error');
    stopScan(tab);
  }
}

function stopScan(tab){
  if(timers[tab]){ clearInterval(timers[tab]); delete timers[tab]; }
  if(streams[tab]){ streams[tab].getTracks().forEach(t=>t.stop()); delete streams[tab]; }
  delete detectors[tab];
  const area=document.getElementById('sa-'+tab);
  const btn=document.getElementById('sb-'+tab);
  const status=document.getElementById('ss-'+tab);
  if(area) area.style.display='none';
  if(status) status.textContent='';
  if(btn){
    const lbl={in:'📷 카메라로 QR 스캔',out:'📷 카메라로 QR 스캔',cancel:'📷 카메라로 QR 스캔'};
    const cls={in:'green',out:'red',cancel:'yellow'};
    btn.textContent=lbl[tab]; btn.className='scan-btn '+cls[tab]; btn.onclick=()=>startScan(tab);
  }
}

async function manualSearch(tab){
  await loadParts();
  const v=(document.getElementById('mn-'+tab).value||'').trim();
  if(!v){ showToast('PART ID를 입력하세요','error'); return; }
  const found=findPart(v);
  if(found){ curPart=found; renderCard(tab,found); }
  else renderErr(tab,v);
}

function chgQty(tab,d){
  const e=document.getElementById('qty-'+tab);
  e.value=Math.max(1,(parseInt(e.value)||1)+d);
}

function reset(tab){
  curPart={};
  document.getElementById('pc-'+tab).innerHTML='';
  document.getElementById('fb-'+tab).style.display='none';
  document.getElementById('mn-'+tab).value='';
  document.getElementById('qty-'+tab).value=1;
  ['mc-out','rm-in','rm-out','rm-cancel'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
}

async function submit(type){
  if(!curPart.PART_ID){ showToast('파트를 먼저 스캔하세요','error'); return; }
  const tab=type==='IN'?'in':type==='OUT'?'out':'cancel';
  const qty=parseInt(document.getElementById('qty-'+tab).value)||1;
  const worker=(document.getElementById('wk-'+tab).value||'').trim();
  if(!worker){ showToast('담당자를 입력하세요','error'); return; }
  localStorage.setItem('stc_worker',worker);
  document.getElementById('workerDisplay').textContent=worker;

  let payload={
    type, partId:curPart.PART_ID, description:curPart.DESCRIPTION,
    qty, worker,
    machine:document.getElementById('mc-out')?document.getElementById('mc-out').value:'',
    remark:document.getElementById('rm-'+tab)?document.getElementById('rm-'+tab).value:''
  };

  if(type==='CANCEL'){
    payload.type=document.getElementById('ct-cancel').value;
    payload.qty=-Math.abs(qty);
    payload.remark='CANCEL: '+(payload.remark||'취소');
  }

  showLoad(true);
  try{
    const res=await fetch(API,{method:'POST',body:JSON.stringify(payload)});
    const data=await res.json();
    showLoad(false);
    if(data.success){
      showToast(`✅ ${type} 완료! ${curPart.PART_ID} × ${Math.abs(qty)}개`,'success');
      savelog({...payload, txId:data.txId, date:new Date().toLocaleDateString('ko-KR')});
      setTimeout(()=>reset(tab),1600);
    } else showToast('❌ 저장 실패: '+(data.error||''),'error');
  }catch(e){ showLoad(false); showToast('❌ 오류: '+e.message,'error'); }
}

function savelog(item){
  const logs=JSON.parse(localStorage.getItem('stc_logs')||'[]');
  logs.unshift(item);
  localStorage.setItem('stc_logs',JSON.stringify(logs.slice(0,50)));
}

function loadLog(){
  const logs=JSON.parse(localStorage.getItem('stc_logs')||'[]');
  const el=document.getElementById('logList');
  if(!logs.length){ el.innerHTML='<div class="empty">기록이 없습니다</div>'; return; }
  el.innerHTML=logs.map(l=>`
    <div class="log-item">
      <div class="log-header">
        <span class="log-txid">${l.txId||'-'} · ${l.type}</span>
        <span class="log-date">${l.date||''}</span>
      </div>
      <div class="log-desc">${l.partId} | ${l.description||''}</div>
      <div class="log-meta">
        <span class="${l.qty>0?'q-in':'q-out'}">${l.qty>0?'+':''}${l.qty}개</span>
        · ${l.worker||''}
        ${l.machine?'· '+l.machine:''}
        ${l.remark?'· '+l.remark:''}
      </div>
    </div>`).join('');
}

function showTab(name,btn){
  ['in','out','cancel'].forEach(t=>stopScan(t));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='log') loadLog();
}

function showLoad(v){ document.getElementById('loadingOv').className='loading-overlay'+(v?' show':''); }
function showToast(msg,type='success'){
  const e=document.getElementById('toast');
  e.textContent=msg; e.className='toast '+type+' show';
  setTimeout(()=>e.className='toast',2800);
}

window.addEventListener('load',async()=>{
  const s=localStorage.getItem('stc_worker');
  if(s) document.getElementById('workerDisplay').textContent=s;
  await loadParts();
});
</script>
</body>
