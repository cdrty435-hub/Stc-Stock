<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STC Parts Management</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card2: #21253a;
  --border: #2a2d3e;
  --accent: #4f8ef7;
  --accent2: #38bdf8;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #a855f7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', 'Sarabun', sans-serif; font-size: 14px; }

/* ── HEADER ── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
.logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 8px; }
.nav-links { display: flex; gap: 4px; }
.nav-btn {
  padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 500; background: transparent; color: var(--text2);
  transition: all .2s;
}
.nav-btn.active { background: var(--accent); color: #fff; }
.nav-btn:hover:not(.active) { background: var(--border); color: var(--text); }

.header-right { display: flex; align-items: center; gap: 10px; }
.load-btn {
  padding: 7px 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
  transition: opacity .2s;
}
.load-btn:hover { opacity: .85; }
.load-btn:disabled { opacity: .5; cursor: not-allowed; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); }
.status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.last-update { font-size: 11px; color: var(--text2); }

/* ── PAGES ── */
.page { display: none; padding: 20px 24px; }
.page.active { display: block; }

/* ── KPI CARDS ── */
.kpi-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.kpi-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 20px; flex: 1; min-width: 140px;
}
.kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
.kpi-value { font-size: 28px; font-weight: 700; }
.kpi-value.red { color: var(--red); }
.kpi-value.yellow { color: var(--yellow); }
.kpi-value.green { color: var(--green); }
.kpi-value.blue { color: var(--blue); }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-bar input, .filter-bar select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 7px 12px;
  font-size: 13px; outline: none;
}
.filter-bar input { width: 220px; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
.filter-label { font-size: 12px; color: var(--text2); }
.badge-filter {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: 12px;
  transition: all .2s;
}
.badge-filter.active-red { background: var(--red); color: #fff; border-color: var(--red); }
.badge-filter.active-yellow { background: var(--yellow); color: #000; border-color: var(--yellow); }
.badge-filter.active-green { background: var(--green); color: #000; border-color: var(--green); }
.badge-filter.active-all { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── TABLE ── */
.table-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.table-wrap table { width: 100%; border-collapse: collapse; }
.table-wrap th {
  background: var(--card2); padding: 10px 12px; text-align: left;
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: .7px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.table-wrap td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  font-size: 13px; vertical-align: middle;
}
.table-wrap tr:last-child td { border-bottom: none; }
.table-wrap tr:hover td { background: rgba(79,142,247,.05); }

.part-id { font-family: monospace; font-size: 12px; color: var(--accent2); font-weight: 600; }
.group-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.group-Korea { background: #1d4ed8; color: #fff; }
.group-Gray { background: #374151; color: #fff; }
.group-Green { background: #166534; color: #fff; }
.group-MTN { background: #7c3aed; color: #fff; }
.group-Nitrogen { background: #0e7490; color: #fff; }

.status-badge {
  display: inline-block; padding: 3px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.status-CRITICAL { background: rgba(239,68,68,.2); color: var(--red); border: 1px solid var(--red); }
.status-Order { background: rgba(245,158,11,.2); color: var(--yellow); border: 1px solid var(--yellow); }
.status-Enough { background: rgba(34,197,94,.2); color: var(--green); border: 1px solid var(--green); }

.stock-num { font-weight: 700; font-size: 15px; }
.stock-CRITICAL { color: var(--red); }
.stock-Order { color: var(--yellow); }
.stock-Enough { color: var(--green); }

.type-text { color: var(--text2); font-size: 12px; }
.desc-text { font-size: 13px; max-width: 280px; }

/* ── IN/OUT PAGE ── */
.section-title {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.section-title span { font-size: 12px; color: var(--text2); font-weight: 400; }

.io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media(max-width:768px) { .io-grid { grid-template-columns: 1fr; } }

.io-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.io-card-header {
  padding: 10px 14px; font-size: 12px; font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase;
}
.io-card-header.in { background: rgba(34,197,94,.15); color: var(--green); border-bottom: 1px solid rgba(34,197,94,.3); }
.io-card-header.out { background: rgba(239,68,68,.15); color: var(--red); border-bottom: 1px solid rgba(239,68,68,.3); }

/* ── EMPTY STATE ── */
.empty {
  padding: 60px 20px; text-align: center; color: var(--text2);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── LOADING ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 60px; color: var(--text2);
}
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PAGINATION ── */
.pagination {
  display: flex; gap: 6px; align-items: center;
  justify-content: flex-end; padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.page-btn {
  padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: 12px;
}
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:hover:not(.active) { background: var(--border); }
.page-info { font-size: 12px; color: var(--text2); margin: 0 8px; }

/* ── GROUP SUMMARY ── */
.group-summary {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
}
.group-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; min-width: 130px; flex: 1;
  cursor: pointer; transition: border-color .2s;
}
.group-card:hover { border-color: var(--accent); }
.group-card.selected { border-color: var(--accent); background: rgba(79,142,247,.08); }
.group-card-name { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.group-card-count { font-size: 20px; font-weight: 700; }
.group-card-sub { font-size: 11px; color: var(--red); margin-top: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">STC <span>Spare Parts</span></div>
    <div class="nav-links">
      <button class="nav-btn active" onclick="showPage('stock')">📦 재고현황</button>
      <button class="nav-btn" onclick="showPage('in')">📥 입고 IN</button>
      <button class="nav-btn" onclick="showPage('out')">📤 출고 OUT</button>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <div class="last-update" id="lastUpdate">미연결</div>
    <button class="load-btn" id="loadBtn" onclick="loadAll()">🔄 데이터 불러오기</button>
  </div>
</div>

<!-- ══ PAGE: 재고현황 ══ -->
<div class="page active" id="page-stock">

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">전체 파트</div>
      <div class="kpi-value blue" id="kpi-total">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🔴 CRITICAL</div>
      <div class="kpi-value red" id="kpi-critical">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🟡 Order 필요</div>
      <div class="kpi-value yellow" id="kpi-order">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">🟢 Enough</div>
      <div class="kpi-value green" id="kpi-enough">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">금월 입고</div>
      <div class="kpi-value blue" id="kpi-in">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">금월 출고</div>
      <div class="kpi-value yellow" id="kpi-out">-</div>
    </div>
  </div>

  <div class="group-summary" id="groupSummary"></div>

  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 파트 검색 (ID / Description)..." oninput="applyFilter()">
    <select id="groupFilter" onchange="applyFilter()">
      <option value="">전체 그룹</option>
      <option value="Korea">Korea</option>
      <option value="Gray Cabinet">Gray Cabinet</option>
      <option value="Green Cabinet">Green Cabinet</option>
      <option value="MTN Room">MTN Room</option>
      <option value="Nitrogen">Nitrogen</option>
    </select>
    <button class="badge-filter active-all" id="bf-all" onclick="setStatusFilter('all')">전체</button>
    <button class="badge-filter" id="bf-critical" onclick="setStatusFilter('CRITICAL')">🔴 CRITICAL</button>
    <button class="badge-filter" id="bf-order" onclick="setStatusFilter('Order')">🟡 Order</button>
    <button class="badge-filter" id="bf-enough" onclick="setStatusFilter('Enough')">🟢 Enough</button>
    <div class="filter-label" id="filterCount"></div>
  </div>

  <div class="table-wrap" id="stockTable">
    <div class="empty"><div class="empty-icon">📦</div><div class="empty-text">데이터 불러오기를 클릭하세요</div></div>
  </div>
</div>

<!-- ══ PAGE: 입고 IN ══ -->
<div class="page" id="page-in">
  <div class="io-grid">
    <div class="io-card">
      <div class="io-card-header in">📥 입고 내역 (IN)</div>
      <div id="inTable">
        <div class="empty"><div class="empty-icon">📥</div><div class="empty-text">데이터 불러오기를 클릭하세요</div></div>
      </div>
    </div>
    <div class="io-card">
      <div class="io-card-header in">📊 금월 입고 현황</div>
      <div id="inSummary">
        <div class="empty"><div class="empty-icon">📊</div><div class="empty-text">데이터 불러오기를 클릭하세요</div></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE: 출고 OUT ══ -->
<div class="page" id="page-out">
  <div class="io-grid">
    <div class="io-card">
      <div class="io-card-header out">📤 출고 내역 (OUT)</div>
      <div id="outTable">
        <div class="empty"><div class="empty-icon">📤</div><div class="empty-text">데이터 불러오기를 클릭하세요</div></div>
      </div>
    </div>
    <div class="io-card">
      <div class="io-card-header out">📊 금월 출고 현황</div>
      <div id="outSummary">
        <div class="empty"><div class="empty-icon">📊</div><div class="empty-text">데이터 불러오기를 클릭하세요</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CSV URLs ──
const URL_PARTS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=579504195&single=true&output=csv';
const URL_IN    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=1549476870&single=true&output=csv';
const URL_OUT   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=2040284431&single=true&output=csv';

let PARTS = [], IN_DATA = [], OUT_DATA = [];
let filteredParts = [];
let statusFilter = 'all';
let currentPage = 1;
const PAGE_SIZE = 30;

// ── CSV 파서 ──
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g, ''));
    return obj;
  });
}

async function fetchCSV(url) {
  const res = await fetch(url);
  const text = await res.text();
  return parseCSV(text);
}

// ── 데이터 로드 ──
async function loadAll() {
  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = '⏳ 로딩중...';
  try {
    [PARTS, IN_DATA, OUT_DATA] = await Promise.all([
      fetchCSV(URL_PARTS), fetchCSV(URL_IN), fetchCSV(URL_OUT)
    ]);
    // CURRENT_STOCK 재계산 (IN - OUT)
    PARTS.forEach(p => {
      const pid = p.PART_ID;
      const inQty  = IN_DATA.filter(r => r.PART_ID === pid).reduce((s,r) => s + (parseFloat(r.QTY)||0), 0);
      const outQty = OUT_DATA.filter(r => r.PART_ID === pid).reduce((s,r) => s + (parseFloat(r.QTY)||0), 0);
      if (inQty > 0 || outQty > 0) {
        p.CURRENT_STOCK = String(inQty - outQty);
      }
      // STATUS 재계산
      const cur = parseFloat(p.CURRENT_STOCK) || 0;
      const min = parseFloat(p.MIN) || 0;
      if (cur === 0) p.STATUS = 'CRITICAL';
      else if (cur < min) p.STATUS = 'Order';
      else p.STATUS = 'Enough';
    });

    document.getElementById('statusDot').className = 'status-dot ok';
    document.getElementById('lastUpdate').textContent = '갱신: ' + new Date().toLocaleTimeString('ko-KR');
    renderAll();
  } catch(e) {
    alert('데이터 로드 실패: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '🔄 데이터 불러오기';
}

function renderAll() {
  updateKPI();
  renderGroupSummary();
  applyFilter();
  renderIN();
  renderOUT();
}

// ── KPI ──
function updateKPI() {
  const total    = PARTS.length;
  const critical = PARTS.filter(p => p.STATUS === 'CRITICAL').length;
  const order    = PARTS.filter(p => p.STATUS === 'Order').length;
  const enough   = PARTS.filter(p => p.STATUS === 'Enough').length;

  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const inMonth  = IN_DATA.filter(r => (r.DATE||'').startsWith(ym)).reduce((s,r) => s+(parseFloat(r.QTY)||0), 0);
  const outMonth = OUT_DATA.filter(r => (r.DATE||'').startsWith(ym)).reduce((s,r) => s+(parseFloat(r.QTY)||0), 0);

  document.getElementById('kpi-total').textContent    = total;
  document.getElementById('kpi-critical').textContent = critical;
  document.getElementById('kpi-order').textContent    = order;
  document.getElementById('kpi-enough').textContent   = enough;
  document.getElementById('kpi-in').textContent       = inMonth;
  document.getElementById('kpi-out').textContent      = outMonth;
}

// ── GROUP SUMMARY ──
function renderGroupSummary() {
  const groups = ['Korea','Gray Cabinet','Green Cabinet','MTN Room','Nitrogen'];
  const el = document.getElementById('groupSummary');
  el.innerHTML = groups.map(g => {
    const gParts = PARTS.filter(p => p.GROUP === g);
    const crit   = gParts.filter(p => p.STATUS === 'CRITICAL').length;
    return `<div class="group-card" onclick="selectGroup('${g}')">
      <div class="group-card-name">${g}</div>
      <div class="group-card-count">${gParts.length}</div>
      ${crit > 0 ? `<div class="group-card-sub">🔴 CRITICAL ${crit}개</div>` : '<div class="group-card-sub" style="color:var(--green)">✅ 정상</div>'}
    </div>`;
  }).join('');
}

function selectGroup(g) {
  document.getElementById('groupFilter').value = g;
  applyFilter();
}

// ── FILTER ──
function setStatusFilter(val) {
  statusFilter = val;
  ['all','critical','order','enough'].forEach(k => {
    document.getElementById('bf-'+k).className = 'badge-filter';
  });
  const cls = {all:'active-all',CRITICAL:'active-red',Order:'active-yellow',Enough:'active-green'};
  document.getElementById('bf-'+(val==='all'?'all':val.toLowerCase())).className = 'badge-filter ' + cls[val];
  currentPage = 1;
  applyFilter();
}

function applyFilter() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const group  = document.getElementById('groupFilter').value;
  filteredParts = PARTS.filter(p => {
    const matchSearch = !search ||
      (p.PART_ID||'').toLowerCase().includes(search) ||
      (p.DESCRIPTION||'').toLowerCase().includes(search) ||
      (p.TYPE||'').toLowerCase().includes(search);
    const matchGroup  = !group || p.GROUP === group;
    const matchStatus = statusFilter === 'all' || p.STATUS === statusFilter;
    return matchSearch && matchGroup && matchStatus;
  });
  document.getElementById('filterCount').textContent = `${filteredParts.length}개`;
  currentPage = 1;
  renderTable();
}

// ── TABLE ──
function renderTable() {
  const el = document.getElementById('stockTable');
  if (!filteredParts.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">검색 결과가 없습니다</div></div>';
    return;
  }
  const total = filteredParts.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const slice = filteredParts.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  const groupClass = g => {
    if (g === 'Korea') return 'group-Korea';
    if (g === 'Gray Cabinet') return 'group-Gray';
    if (g === 'Green Cabinet') return 'group-Green';
    if (g === 'MTN Room') return 'group-MTN';
    return 'group-Nitrogen';
  };

  const rows = slice.map(p => {
    const cur = parseFloat(p.CURRENT_STOCK) || 0;
    const min = parseFloat(p.MIN) || 0;
    const max = parseFloat(p.MAX) || 0;
    const st  = p.STATUS || 'Enough';
    return `<tr>
      <td><span class="part-id">${p.PART_ID||''}</span></td>
      <td><span class="group-badge ${groupClass(p.GROUP)}">${p.GROUP||''}</span></td>
      <td class="type-text">${(p.TYPE||'').replace('Fuse','').replace('ฟิวส์','').trim()||p.TYPE||''}</td>
      <td class="desc-text">${p.DESCRIPTION||''}</td>
      <td style="text-align:center">${min}</td>
      <td style="text-align:center">${max}</td>
      <td style="text-align:center"><span class="stock-num stock-${st}">${cur}</span></td>
      <td><span class="status-badge status-${st}">${st}</span></td>
      <td style="text-align:center">${p.CABINET||'-'}</td>
    </tr>`;
  }).join('');

  const paginationBtns = [];
  for (let i = 1; i <= pages; i++) {
    paginationBtns.push(`<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`);
  }

  el.innerHTML = `
    <table>
      <thead><tr>
        <th>PART ID</th><th>그룹</th><th>종류</th><th>Description</th>
        <th>MIN</th><th>MAX</th><th>현재고</th><th>상태</th><th>위치</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="pagination">
      <span class="page-info">총 ${total}개 / ${pages}페이지</span>
      ${paginationBtns.join('')}
    </div>`;
}

function goPage(p) { currentPage = p; renderTable(); }

// ── IN TABLE ──
function renderIN() {
  const el = document.getElementById('inTable');
  if (!IN_DATA.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📥</div><div class="empty-text">입고 내역 없음</div></div>';
    return;
  }
  const rows = [...IN_DATA].reverse().slice(0,50).map(r =>
    `<tr>
      <td>${r.DATE||''}</td>
      <td><span class="part-id">${r.PART_ID||''}</span></td>
      <td>${r.DESCRIPTION||''}</td>
      <td style="text-align:center;color:var(--green);font-weight:700">+${r.QTY||0}</td>
      <td>${r.WORKER||''}</td>
    </tr>`
  ).join('');
  el.innerHTML = `<table>
    <thead><tr><th>날짜</th><th>PART ID</th><th>Description</th><th>수량</th><th>담당자</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  // 요약
  const summary = {};
  IN_DATA.forEach(r => {
    summary[r.PART_ID] = (summary[r.PART_ID]||0) + (parseFloat(r.QTY)||0);
  });
  const top = Object.entries(summary).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById('inSummary').innerHTML = `<table>
    <thead><tr><th>PART ID</th><th>총 입고</th></tr></thead>
    <tbody>${top.map(([id,q])=>`<tr><td><span class="part-id">${id}</span></td><td style="color:var(--green);font-weight:700">+${q}</td></tr>`).join('')}</tbody>
  </table>`;
}

// ── OUT TABLE ──
function renderOUT() {
  const el = document.getElementById('outTable');
  if (!OUT_DATA.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📤</div><div class="empty-text">출고 내역 없음</div></div>';
    return;
  }
  const rows = [...OUT_DATA].reverse().slice(0,50).map(r =>
    `<tr>
      <td>${r.DATE||''}</td>
      <td><span class="part-id">${r.PART_ID||''}</span></td>
      <td>${r.DESCRIPTION||''}</td>
      <td style="text-align:center;color:var(--red);font-weight:700">-${r.QTY||0}</td>
      <td>${r.WORKER||''}</td>
      <td>${r.MACHINE||''}</td>
    </tr>`
  ).join('');
  el.innerHTML = `<table>
    <thead><tr><th>날짜</th><th>PART ID</th><th>Description</th><th>수량</th><th>담당자</th><th>설비</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  const summary = {};
  OUT_DATA.forEach(r => {
    summary[r.PART_ID] = (summary[r.PART_ID]||0) + (parseFloat(r.QTY)||0);
  });
  const top = Object.entries(summary).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById('outSummary').innerHTML = `<table>
    <thead><tr><th>PART ID</th><th>총 출고</th></tr></thead>
    <tbody>${top.map(([id,q])=>`<tr><td><span class="part-id">${id}</span></td><td style="color:var(--red);font-weight:700">-${q}</td></tr>`).join('')}</tbody>
  </table>`;
}

// ── 페이지 전환 ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
