<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STC Parts Management</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Light Gray Theme */
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --card2: #e8eaed;
  --border: #d1d5db;
  --accent: #2563eb;
  --accent2: #0ea5e9;
  --text: #1f2937;
  --text2: #6b7280;
  --green: #16a34a;
  --yellow: #d97706;
  --red: #dc2626;
  --blue: #2563eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter','Sarabun',sans-serif; font-size: 14px; }

/* ── HEADER ── */
.header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 17px; font-weight: 700; color: var(--accent); }
.logo span { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: 8px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.load-btn {
  padding: 7px 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
}
.load-btn:hover { opacity: .85; }
.load-btn:disabled { opacity: .5; cursor: not-allowed; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); }
.status-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.last-update { font-size: 11px; color: var(--text2); }

/* ── NAV 1단 (메인) ── */
.nav1 {
  background: var(--card2); border-bottom: 1px solid var(--border);
  display: flex; gap: 2px; padding: 0 24px;
  position: sticky; top: 53px; z-index: 99;
}
.nav1-btn {
  padding: 10px 18px; border: none; background: transparent;
  color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 500;
  border-bottom: 3px solid transparent; transition: all .2s;
}
.nav1-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav1-btn:hover:not(.active) { color: var(--text); }

/* ── NAV 2단 (그룹) ── */
.nav2 {
  background: #e8eaed; border-bottom: 1px solid var(--border);
  display: flex; gap: 4px; padding: 8px 24px;
  position: sticky; top: 100px; z-index: 98; flex-wrap: wrap;
}
.nav2-btn {
  padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer;
  font-size: 12px; font-weight: 500; transition: all .2s;
  display: flex; align-items: center; gap: 5px;
}
.nav2-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.nav2-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
.nav2-badge {
  background: rgba(255,255,255,.15); border-radius: 10px;
  padding: 1px 6px; font-size: 10px; font-weight: 700;
}
.nav2-crit { background: var(--red); border-radius: 10px; padding: 1px 5px; font-size: 10px; color: #fff; }

/* ── KPI ── */
.kpi-row { display: flex; gap: 10px; padding: 16px 24px 0; flex-wrap: wrap; }
.kpi-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 120px;
}
.kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 4px; }
.kpi-value { font-size: 26px; font-weight: 700; }
.kpi-value.red { color: var(--red); }
.kpi-value.yellow { color: var(--yellow); }
.kpi-value.green { color: var(--green); }
.kpi-value.blue { color: var(--blue); }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin: 12px 24px;
}
.filter-bar input, .filter-bar select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 6px 10px;
  font-size: 13px; outline: none;
}
.filter-bar input { width: 220px; }
.filter-bar input:focus { border-color: var(--accent); }
.sf-btn {
  padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; transition: all .2s;
}
.sf-btn.s-all      { background: var(--accent); color: #fff; border-color: var(--accent); }
.sf-btn.s-critical { background: var(--red);    color: #fff; border-color: var(--red); }
.sf-btn.s-order    { background: var(--yellow); color: #000; border-color: var(--yellow); }
.sf-btn.s-enough   { background: var(--green);  color: #000; border-color: var(--green); }
.sf-btn.s-over     { background: #818cf8; color: #fff; border-color: #818cf8; }
.filter-count { font-size: 12px; color: var(--text2); margin-left: 4px; }

/* ── TABLE ── */
.table-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; margin: 0 24px 20px;
}
.table-wrap table { width: 100%; border-collapse: collapse; }
.table-wrap th {
  background: #d1d5db; padding: 9px 12px; text-align: left;
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: .6px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.table-wrap td {
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  font-size: 13px; vertical-align: middle;
}
.table-wrap tr:last-child td { border-bottom: none; }
.table-wrap tr:hover td { background: rgba(79,142,247,.05); }

.part-id { font-family: monospace; font-size: 12px; color: var(--accent2); font-weight: 700; }
.group-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.g-Korea   { background: #1d4ed8; color: #fff; }
.g-Gray    { background: #374151; color: #fff; }
.g-Green   { background: #166534; color: #fff; }
.g-MTN     { background: #7c3aed; color: #fff; }
.g-Nitrogen{ background: #0e7490; color: #fff; }

.status-badge {
  display: inline-block; padding: 3px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.st-CRITICAL { background: rgba(239,68,68,.2);  color: var(--red);    border: 1px solid var(--red); }
.st-Order    { background: rgba(245,158,11,.2); color: var(--yellow); border: 1px solid var(--yellow); }
.st-Enough   { background: rgba(34,197,94,.2);  color: var(--green);  border: 1px solid var(--green); }
.st-Over     { background: rgba(99,102,241,.2); color: #818cf8; border: 1px solid #818cf8; }
.stock-CRITICAL { color: var(--red);    font-weight: 700; font-size: 15px; }
.stock-Order    { color: var(--yellow); font-weight: 700; font-size: 15px; }
.stock-Enough   { color: var(--green);  font-weight: 700; font-size: 15px; }
.stock-Over     { color: #818cf8; font-weight: 700; font-size: 15px; }

/* ── PAGE ── */
.page { display: none; }
.page.active { display: block; }

/* ── IO TABLE ── */
.io-wrap { padding: 16px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:768px){ .io-wrap { grid-template-columns: 1fr; } }
.io-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.io-head { padding: 10px 14px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.io-head.in  { background: rgba(34,197,94,.12);  color: var(--green);  border-bottom: 1px solid rgba(34,197,94,.3); }
.io-head.out { background: rgba(239,68,68,.12);   color: var(--red);    border-bottom: 1px solid rgba(239,68,68,.3); }

/* ── EMPTY / PAGINATION ── */
.empty { padding: 50px; text-align: center; color: var(--text2); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.pagination {
  display: flex; gap: 4px; align-items: center;
  justify-content: flex-end; padding: 10px 14px;
  border-top: 1px solid var(--border); flex-wrap: wrap;
}
.pg-btn {
  padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: 11px;
}
.pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.pg-btn:hover:not(.active) { background: var(--border); }
.pg-info { font-size: 11px; color: var(--text2); margin: 0 6px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">STC <span>Spare Parts Management</span></div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <div class="last-update" id="lastUpdate">미연결</div>
    <button class="load-btn" id="loadBtn" onclick="loadAll()">🔄 데이터 불러오기</button>
  </div>
</div>

<!-- NAV 1단: 메인 메뉴 -->
<div class="nav1">
  <button class="nav1-btn active" onclick="showMain('stock',this)">📦 재고현황</button>
  <button class="nav1-btn" onclick="showMain('in',this)">📥 입고 IN</button>
  <button class="nav1-btn" onclick="showMain('out',this)">📤 출고 OUT</button>
</div>

<!-- NAV 2단: 그룹 탭 (재고현황에서만 표시) -->
<div class="nav2" id="nav2">
  <button class="nav2-btn active" onclick="showGroup('all',this)">
    🗂️ 전체 <span class="nav2-badge" id="cnt-all">0</span>
  </button>
  <button class="nav2-btn" onclick="showGroup('Korea',this)">
    🇰🇷 Korea <span class="nav2-badge" id="cnt-Korea">0</span>
    <span class="nav2-crit" id="crit-Korea" style="display:none"></span>
  </button>
  <button class="nav2-btn" onclick="showGroup('Gray Cabinet',this)">
    🗄️ Gray Cabinet <span class="nav2-badge" id="cnt-Gray Cabinet">0</span>
    <span class="nav2-crit" id="crit-Gray Cabinet" style="display:none"></span>
  </button>
  <button class="nav2-btn" onclick="showGroup('Green Cabinet',this)">
    🟢 Green Cabinet <span class="nav2-badge" id="cnt-Green Cabinet">0</span>
    <span class="nav2-crit" id="crit-Green Cabinet" style="display:none"></span>
  </button>
  <button class="nav2-btn" onclick="showGroup('MTN Room',this)">
    🔧 MTN Room <span class="nav2-badge" id="cnt-MTN Room">0</span>
    <span class="nav2-crit" id="crit-MTN Room" style="display:none"></span>
  </button>
  <button class="nav2-btn" onclick="showGroup('Nitrogen',this)">
    💨 Nitrogen <span class="nav2-badge" id="cnt-Nitrogen">0</span>
    <span class="nav2-crit" id="crit-Nitrogen" style="display:none"></span>
  </button>
</div>

<!-- KPI -->
<div class="kpi-row" id="kpiRow">
  <div class="kpi-card"><div class="kpi-label">전체 파트</div><div class="kpi-value blue" id="kpi-total">-</div></div>
  <div class="kpi-card"><div class="kpi-label">🔴 재고없음 / วิกฤต</div><div class="kpi-value red" id="kpi-critical">-</div></div>
  <div class="kpi-card"><div class="kpi-label">🟡 주문필요 / สั่งซื้อ</div><div class="kpi-value yellow" id="kpi-order">-</div></div>
  <div class="kpi-card"><div class="kpi-label">🟢 충분 / เพียงพอ</div><div class="kpi-value green" id="kpi-enough">-</div></div>
  <div class="kpi-card"><div class="kpi-label">🔵 과잉 / เกิน</div><div class="kpi-value" style="color:#818cf8" id="kpi-over">-</div></div>
  <div class="kpi-card"><div class="kpi-label">금월 입고</div><div class="kpi-value blue" id="kpi-in">-</div></div>
  <div class="kpi-card"><div class="kpi-label">금월 출고</div><div class="kpi-value yellow" id="kpi-out">-</div></div>
</div>

<!-- PAGE: 재고현황 -->
<div class="page active" id="page-stock">

  <!-- 그룹 서머리 -->
  <div class="table-wrap" id="summaryTable" style="margin:12px 24px 0;"></div>

  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 검색 (ID / Description)..." oninput="applyFilter()">
    <button class="sf-btn s-all"      id="sf-all"      onclick="setSF('all')">전체</button>
    <button class="sf-btn"            id="sf-critical" onclick="setSF('CRITICAL')">🔴 재고없음 / วิกฤต</button>
    <button class="sf-btn"            id="sf-order"    onclick="setSF('Order')">🟡 주문필요</button>
    <button class="sf-btn"            id="sf-enough"   onclick="setSF('Enough')">🟢 충분 / เพียงพอ</button>
    <button class="sf-btn"            id="sf-over"     onclick="setSF('Over')">🔵 과잉 / เกิน</button>
    <span class="filter-count" id="filterCount"></span>
  </div>
  <div class="table-wrap" id="stockTable">
    <div class="empty"><div class="empty-icon">📦</div><div>데이터 불러오기를 클릭하세요</div></div>
  </div>
</div>

<!-- PAGE: 입고 IN -->
<div class="page" id="page-in">
  <div class="io-wrap">
    <div class="io-card">
      <div class="io-head in">📥 입고 내역 (IN)</div>
      <div id="inTable"><div class="empty"><div class="empty-icon">📥</div><div>데이터 불러오기를 클릭하세요</div></div></div>
    </div>
    <div class="io-card">
      <div class="io-head in">📊 파트별 총 입고</div>
      <div id="inSummary"><div class="empty"><div class="empty-icon">📊</div><div>데이터 불러오기를 클릭하세요</div></div></div>
    </div>
  </div>
</div>

<!-- PAGE: 출고 OUT -->
<div class="page" id="page-out">
  <div class="io-wrap">
    <div class="io-card">
      <div class="io-head out">📤 출고 내역 (OUT)</div>
      <div id="outTable"><div class="empty"><div class="empty-icon">📤</div><div>데이터 불러오기를 클릭하세요</div></div></div>
    </div>
    <div class="io-card">
      <div class="io-head out">📊 파트별 총 출고</div>
      <div id="outSummary"><div class="empty"><div class="empty-icon">📊</div><div>데이터 불러오기를 클릭하세요</div></div></div>
    </div>
  </div>
</div>

<script>
const URL_PARTS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=579504195&single=true&output=csv';
const URL_IN    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=1549476870&single=true&output=csv';
const URL_OUT   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTl64JWJPS_KaHXkeozdd3ENLvSm1DEZpGU0XImKMZ8PWzfVbsbZWXsRBvZZzRw076zICbmImDKJOZk/pub?gid=2040284431&single=true&output=csv';

const GROUPS = ['Korea','Gray Cabinet','Green Cabinet','MTN Room','Nitrogen'];
const GROUP_CLS = {'Korea':'g-Korea','Gray Cabinet':'g-Gray','Green Cabinet':'g-Green','MTN Room':'g-MTN','Nitrogen':'g-Nitrogen'};

let PARTS=[], IN_DATA=[], OUT_DATA=[];
let filteredParts=[];
let currentGroup='all', statusFilter='all', currentPage=1;
const PAGE_SIZE=30;

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2) return [];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(let c of line){
      if(c==='"') inQ=!inQ;
      else if(c===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}

async function fetchCSV(url){
  const res=await fetch(url);
  return parseCSV(await res.text());
}

async function loadAll(){
  const btn=document.getElementById('loadBtn');
  btn.disabled=true; btn.textContent='⏳ 로딩중...';
  try{
    [PARTS,IN_DATA,OUT_DATA]=await Promise.all([fetchCSV(URL_PARTS),fetchCSV(URL_IN),fetchCSV(URL_OUT)]);
    // CURRENT_STOCK 재계산
    PARTS.forEach(p=>{
      const pid=p.PART_ID;
      const inQ =IN_DATA.filter(r=>r.PART_ID===pid).reduce((s,r)=>s+(parseFloat(r.QTY)||0),0);
      const outQ=OUT_DATA.filter(r=>r.PART_ID===pid).reduce((s,r)=>s+(parseFloat(r.QTY)||0),0);
      if(inQ>0||outQ>0) p.CURRENT_STOCK=String(inQ-outQ);
      const cur=parseFloat(p.CURRENT_STOCK)||0;
      const min=parseFloat(p.MIN)||0;
      const max=parseFloat(p.MAX)||0;
      p.STATUS=cur===0?'CRITICAL':cur<min?'Order':cur>max?'Over':'Enough';
    });
    document.getElementById('statusDot').className='status-dot ok';
    document.getElementById('lastUpdate').textContent='갱신: '+new Date().toLocaleTimeString('ko-KR');
    updateKPI();
    updateNav2Badges();
    renderSummary();
    applyFilter();
    renderIN();
    renderOUT();
  }catch(e){ alert('로드 실패: '+e.message); }
  btn.disabled=false; btn.textContent='🔄 데이터 불러오기';
}

function updateKPI(){
  const base=currentGroup==='all'?PARTS:PARTS.filter(p=>p.GROUP===currentGroup);
  document.getElementById('kpi-total').textContent=base.length;
  document.getElementById('kpi-critical').textContent=base.filter(p=>p.STATUS==='CRITICAL').length;
  document.getElementById('kpi-order').textContent=base.filter(p=>p.STATUS==='Order').length;
  document.getElementById('kpi-enough').textContent=base.filter(p=>p.STATUS==='Enough').length;
  const overEl=document.getElementById('kpi-over'); if(overEl) overEl.textContent=base.filter(p=>p.STATUS==='Over').length;
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('kpi-in').textContent =IN_DATA.filter(r=>(r.DATE||'').startsWith(ym)).reduce((s,r)=>s+(parseFloat(r.QTY)||0),0);
  document.getElementById('kpi-out').textContent=OUT_DATA.filter(r=>(r.DATE||'').startsWith(ym)).reduce((s,r)=>s+(parseFloat(r.QTY)||0),0);
}

function updateNav2Badges(){
  const allCount=PARTS.length;
  document.getElementById('cnt-all').textContent=allCount;
  GROUPS.forEach(g=>{
    const gp=PARTS.filter(p=>p.GROUP===g);
    const crit=gp.filter(p=>p.STATUS==='CRITICAL').length;
    const cntEl=document.getElementById('cnt-'+g);
    const critEl=document.getElementById('crit-'+g);
    if(cntEl) cntEl.textContent=gp.length;
    if(critEl){
      if(crit>0){ critEl.textContent=crit; critEl.style.display=''; }
      else critEl.style.display='none';
    }
  });
}

function renderSummary(){
  const el=document.getElementById('summaryTable');
  if(!PARTS.length){ el.innerHTML=''; return; }
  const isAll=currentGroup==='all';
  const groups=isAll?GROUPS:[currentGroup];
  const rows=groups.map(g=>{
    const gp=PARTS.filter(p=>p.GROUP===g);
    const tMin  =gp.reduce((s,p)=>s+(parseFloat(p.MIN)||0),0);
    const tMax  =gp.reduce((s,p)=>s+(parseFloat(p.MAX)||0),0);
    const tStock=gp.reduce((s,p)=>s+(parseFloat(p.CURRENT_STOCK)||0),0);
    const tIn   =IN_DATA.filter(r=>gp.some(p=>p.PART_ID===r.PART_ID)).reduce((s,r)=>s+(parseFloat(r.QTY)||0),0);
    const tOut  =OUT_DATA.filter(r=>gp.some(p=>p.PART_ID===r.PART_ID)).reduce((s,r)=>s+(parseFloat(r.QTY)||0),0);
    const crit  =gp.filter(p=>p.STATUS==='CRITICAL').length;
    const order =gp.filter(p=>p.STATUS==='Order').length;
    const enough=gp.filter(p=>p.STATUS==='Enough').length;
    const over  =gp.filter(p=>p.STATUS==='Over').length;
    return `<tr>
      <td><span class="group-badge ${GROUP_CLS[g]||''}">${g}</span></td>
      <td style="text-align:center;font-weight:600">${gp.length}</td>
      <td style="text-align:center;font-weight:700;color:var(--accent2)">${tStock}</td>
      <td style="text-align:center;color:var(--green);font-weight:600">+${tIn}</td>
      <td style="text-align:center;color:var(--red);font-weight:600">-${tOut}</td>
      <td style="text-align:center"><span class="status-badge st-CRITICAL">${crit}</span></td>
      <td style="text-align:center"><span class="status-badge st-Order" style="cursor:pointer" onclick="showOrderList('${g}')">${order}</span></td>
      <td style="text-align:center"><span class="status-badge st-Enough">${enough}</span></td>
      <td style="text-align:center"><span class="status-badge st-Over">${over}</span></td>
    </tr>`;
  }).join('');

  let totalRow='';
  if(isAll){
    const tStock=PARTS.reduce((s,p)=>s+(parseFloat(p.CURRENT_STOCK)||0),0);
    const tIn   =IN_DATA.reduce((s,r)=>s+(parseFloat(r.QTY)||0),0);
    const tOut  =OUT_DATA.reduce((s,r)=>s+(parseFloat(r.QTY)||0),0);
    const tCrit =PARTS.filter(p=>p.STATUS==='CRITICAL').length;
    const tOrder=PARTS.filter(p=>p.STATUS==='Order').length;
    const tEnough=PARTS.filter(p=>p.STATUS==='Enough').length;
    const tOver =PARTS.filter(p=>p.STATUS==='Over').length;
    totalRow=`<tr style="background:var(--card2);font-weight:700;border-top:2px solid var(--border)">
      <td style="color:var(--accent)">📊 합계</td>
      <td style="text-align:center">${PARTS.length}</td>
      <td style="text-align:center;color:var(--accent2)">${tStock}</td>
      <td style="text-align:center;color:var(--green)">+${tIn}</td>
      <td style="text-align:center;color:var(--red)">-${tOut}</td>
      <td style="text-align:center;color:var(--red)">${tCrit}</td>
      <td style="text-align:center;color:var(--yellow)">${tOrder}</td>
      <td style="text-align:center;color:var(--green)">${tEnough}</td>
      <td style="text-align:center;color:#818cf8">${tOver}</td>
    </tr>`;
  }
  el.innerHTML=`<table>
    <thead><tr>
      <th>그룹</th><th>파트수</th>
      <th>현재고</th><th>총 IN</th><th>총 OUT</th>
      <th>🔴재고없음</th><th>🟡주문필요</th><th>🟢충분</th><th>🔵과잉</th>
    </tr></thead>
    <tbody>${rows}${totalRow}</tbody>
  </table>`;
}

function showGroup(g, btn){
  currentGroup=g; currentPage=1;
  document.querySelectorAll('.nav2-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateKPI();
  renderSummary();
  applyFilter();
}

function showMain(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav1-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  // nav2, kpi, filter는 재고현황에서만 표시
  const isStock=name==='stock';
  document.getElementById('nav2').style.display=isStock?'flex':'none';
  document.getElementById('kpiRow').style.display=isStock?'flex':'none';
}

function setSF(val){
  statusFilter=val; currentPage=1;
  ['all','critical','order','enough'].forEach(k=>{
    document.getElementById('sf-'+k).className='sf-btn';
  });
  const cls={all:'s-all',CRITICAL:'s-critical',Order:'s-order',Enough:'s-enough',Over:'s-over'};
  document.getElementById('sf-'+(val==='all'?'all':val.toLowerCase())).className='sf-btn '+cls[val];
  applyFilter();
}

function applyFilter(){
  const search=(document.getElementById('searchInput').value||'').toLowerCase();
  filteredParts=PARTS.filter(p=>{
    const mg=currentGroup==='all'||p.GROUP===currentGroup;
    const ms=statusFilter==='all'||p.STATUS===statusFilter;
    const mq=!search||(p.PART_ID||'').toLowerCase().includes(search)||(p.DESCRIPTION||'').toLowerCase().includes(search)||(p.TYPE||'').toLowerCase().includes(search);
    return mg&&ms&&mq;
  });
  document.getElementById('filterCount').textContent=filteredParts.length+'개';
  currentPage=1;
  renderTable();
}

function renderTable(){
  const el=document.getElementById('stockTable');
  if(!filteredParts.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>검색 결과 없음</div></div>';
    return;
  }
  const pages=Math.ceil(filteredParts.length/PAGE_SIZE);
  const slice=filteredParts.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
  const rows=slice.map(p=>{
    const cur=parseFloat(p.CURRENT_STOCK)||0;
    const st=p.STATUS||'Enough';
    return `<tr>
      <td><span class="part-id">${p.PART_ID||''}</span></td>
      <td><span class="group-badge ${GROUP_CLS[p.GROUP]||''}">${p.GROUP||''}</span></td>
      <td style="color:var(--text2);font-size:12px">${p.TYPE||''}</td>
      <td>${p.DESCRIPTION||''}</td>
      <td style="text-align:center">${p.MIN||0}</td>
      <td style="text-align:center">${p.MAX||0}</td>
      <td style="text-align:center"><span class="stock-${st}">${cur}</span></td>
      <td><span class="status-badge st-${st}">${{CRITICAL:'재고없음/วิกฤต',Order:'주문필요/สั่งซื้อ',Enough:'충분/เพียงพอ',Over:'과잉/เกิน'}[st]||st}</span></td>
      <td style="color:var(--text2);font-size:12px;text-align:center">${p.CABINET||'-'}</td>
    </tr>`;
  }).join('');

  let pgBtns='';
  if(pages>1){
    if(currentPage>1) pgBtns+=`<button class="pg-btn" onclick="goPage(${currentPage-1})">◀</button>`;
    for(let i=Math.max(1,currentPage-2);i<=Math.min(pages,currentPage+2);i++)
      pgBtns+=`<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
    if(currentPage<pages) pgBtns+=`<button class="pg-btn" onclick="goPage(${currentPage+1})">▶</button>`;
  }

  el.innerHTML=`<table>
    <thead><tr>
      <th>PART ID</th><th>그룹</th><th>종류</th><th>Description</th>
      <th>MIN</th><th>MAX</th><th>현재고</th><th>상태</th><th>위치</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="pagination">
    <span class="pg-info">총 ${filteredParts.length}개 / ${pages}페이지</span>
    ${pgBtns}
  </div>`;
}

function goPage(p){ currentPage=p; renderTable(); }

// 페이지 열리면 자동 로드
window.addEventListener('load', loadAll);

function renderIN(){
  const el=document.getElementById('inTable');
  if(!IN_DATA.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📥</div><div>입고 내역 없음</div></div>';
    document.getElementById('inSummary').innerHTML='<div class="empty"><div class="empty-icon">📊</div><div>데이터 없음</div></div>';
    return;
  }
  const rows=[...IN_DATA].reverse().slice(0,50).map(r=>
    `<tr><td>${r.DATE||''}</td><td><span class="part-id">${r.PART_ID||''}</span></td>
    <td style="font-size:12px">${r.DESCRIPTION||''}</td>
    <td style="text-align:center;color:var(--green);font-weight:700">+${r.QTY||0}</td>
    <td style="font-size:12px">${r.WORKER||''}</td></tr>`
  ).join('');
  el.innerHTML=`<table><thead><tr><th>날짜</th><th>PART ID</th><th>Description</th><th>수량</th><th>담당자</th></tr></thead><tbody>${rows}</tbody></table>`;
  const sm={};
  IN_DATA.forEach(r=>{ sm[r.PART_ID]=(sm[r.PART_ID]||0)+(parseFloat(r.QTY)||0); });
  const top=Object.entries(sm).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById('inSummary').innerHTML=`<table><thead><tr><th>PART ID</th><th>총 입고</th></tr></thead><tbody>
    ${top.map(([id,q])=>`<tr><td><span class="part-id">${id}</span></td><td style="color:var(--green);font-weight:700">+${q}</td></tr>`).join('')}
  </tbody></table>`;
}

function renderOUT(){
  const el=document.getElementById('outTable');
  if(!OUT_DATA.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📤</div><div>출고 내역 없음</div></div>';
    document.getElementById('outSummary').innerHTML='<div class="empty"><div class="empty-icon">📊</div><div>데이터 없음</div></div>';
    return;
  }
  const rows=[...OUT_DATA].reverse().slice(0,50).map(r=>
    `<tr><td>${r.DATE||''}</td><td><span class="part-id">${r.PART_ID||''}</span></td>
    <td style="font-size:12px">${r.DESCRIPTION||''}</td>
    <td style="text-align:center;color:var(--red);font-weight:700">-${r.QTY||0}</td>
    <td style="font-size:12px">${r.WORKER||''}</td>
    <td style="font-size:12px">${r.MACHINE||''}</td></tr>`
  ).join('');
  el.innerHTML=`<table><thead><tr><th>날짜</th><th>PART ID</th><th>Description</th><th>수량</th><th>담당자</th><th>설비</th></tr></thead><tbody>${rows}</tbody></table>`;
  const sm={};
  OUT_DATA.forEach(r=>{ sm[r.PART_ID]=(sm[r.PART_ID]||0)+(parseFloat(r.QTY)||0); });
  const top=Object.entries(sm).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById('outSummary').innerHTML=`<table><thead><tr><th>PART ID</th><th>총 출고</th></tr></thead><tbody>
    ${top.map(([id,q])=>`<tr><td><span class="part-id">${id}</span></td><td style="color:var(--red);font-weight:700">-${q}</td></tr>`).join('')}
  </tbody></table>`;
}


function showOrderList(group){
  const target = group === 'all' ? PARTS : PARTS.filter(p=>p.GROUP===group);
  const orderParts = target.filter(p=>p.STATUS==='Order'||p.STATUS==='CRITICAL');
  document.getElementById('modalTitle').textContent = `🟡 주문필요 파트 — ${group==='all'?'전체':group} (${orderParts.length}개)`;
  if(!orderParts.length){
    document.getElementById('modalContent').innerHTML='<div style="text-align:center;padding:30px;color:var(--text2)">주문 필요 파트가 없습니다</div>';
  } else {
    const rows = orderParts.map(p=>{
      const cur=parseFloat(p.CURRENT_STOCK)||0;
      const min=parseFloat(p.MIN)||0;
      const need=Math.max(0,min-cur);
      return `<tr>
        <td><span style="font-family:monospace;color:var(--accent);font-weight:700">${p.PART_ID}</span></td>
        <td style="font-size:12px">${p.DESCRIPTION||''}</td>
        <td style="text-align:center"><span class="status-badge st-${p.STATUS}">${{'CRITICAL':'재고없음','Order':'주문필요'}[p.STATUS]||p.STATUS}</span></td>
        <td style="text-align:center;font-weight:700;color:var(--red)">${cur}</td>
        <td style="text-align:center;color:var(--text2)">${min}</td>
        <td style="text-align:center;color:var(--text2)">${p.MAX||0}</td>
        <td style="text-align:center;font-weight:700;color:var(--yellow)">+${need}</td>
      </tr>`;
    }).join('');
    document.getElementById('modalContent').innerHTML=`
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--card2)">
          <th style="padding:8px;text-align:left;font-size:11px;color:var(--text2)">PART ID</th>
          <th style="padding:8px;text-align:left;font-size:11px;color:var(--text2)">Description</th>
          <th style="padding:8px;text-align:center;font-size:11px;color:var(--text2)">상태</th>
          <th style="padding:8px;text-align:center;font-size:11px;color:var(--text2)">현재고</th>
          <th style="padding:8px;text-align:center;font-size:11px;color:var(--text2)">MIN</th>
          <th style="padding:8px;text-align:center;font-size:11px;color:var(--text2)">MAX</th>
          <th style="padding:8px;text-align:center;font-size:11px;color:var(--text2)">필요수량</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
  const modal=document.getElementById('orderModal');
  modal.style.display='flex';
}

function closeModal(){
  document.getElementById('orderModal').style.display='none';
}

// 자동 갱신 5분마다
setInterval(loadAll, 5 * 60 * 1000);
</script>

<!-- ORDER 팝업 모달 -->
<div id="orderModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:14px;padding:24px;width:90%;max-width:700px;max-height:80vh;overflow-y:auto;border:1px solid var(--border);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700;color:var(--text)" id="modalTitle">주문 필요 파트</div>
      <button onclick="closeModal()" style="padding:6px 14px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600">✕ 닫기</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

</body>
